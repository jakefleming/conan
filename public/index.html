<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Annotator</title>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111;
    --surface: #191919;
    --surface-2: #222;
    --surface-3: #2a2a2a;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #e0e0e0;
    --text-muted: #888;
    --text-subtle: #666;
    --accent: #fff;
    --accent-hover: #ccc;
    --accent-glow: rgba(255,255,255,0.06);
    --accent-subtle: rgba(255,255,255,0.04);
    --accent-on: #111;
    --secondary: #999;
    --secondary-glow: rgba(255,255,255,0.04);
    --green: #4ade80;
    --green-glow: rgba(74, 222, 128, 0.08);
    --yellow: #facc15;
    --red: #f87171;
    --red-glow: rgba(248, 113, 113, 0.08);
    --gold: #fff;
    --radius: 6px;
    --radius-lg: 8px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.4);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.5);
    --shadow-glow: none;
    --region-stroke: #00ff00;
    --region-stroke-selected: #f87171;
    --region-label-bg: #00ff00;
    --region-label-selected-bg: #f87171;
    --region-label-text: #000;
    --region-label-selected-text: white;
    --comment-user-color: #e0e0e0;
    --comment-claude-color: #4ade80;
    --grain-opacity: 0;
    --topbar-accent-line: none;
    --logo-gradient: none;
    --accent-gradient: #fff;
    --accent-gradient-alt: #fff;
    --chat-user-bg: #fff;
    --chat-user-text: #111;
    --chat-icon-bg: #fff;
    --chat-icon-fill: #111;
    --nav-btn-bg: rgba(255,255,255,0.06);
    --nav-btn-border: rgba(255,255,255,0.1);
    --nav-btn-hover-bg: rgba(255,255,255,0.14);
    --nav-btn-color: #e0e0e0;
    --modal-overlay: rgba(0,0,0,0.7);
    --scrollbar-thumb: #333;
    --preview-radial: transparent;
    --hover-overlay: rgba(255,255,255,0.06);
    --hover-overlay-strong: rgba(255,255,255,0.12);
    --shimmer-base: rgba(255,255,255,0.04);
    --shimmer-highlight: rgba(255,255,255,0.08);
    --spinner-track: rgba(255,255,255,0.1);
    --code-bg: rgba(255,255,255,0.06);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f5f5;
      --surface: #fff;
      --surface-2: #f0f0f0;
      --surface-3: #e6e6e6;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --text: #111;
      --text-muted: #666;
      --text-subtle: #999;
      --accent: #111;
      --accent-hover: #333;
      --accent-glow: rgba(0,0,0,0.06);
      --accent-subtle: rgba(0,0,0,0.04);
      --accent-on: #fff;
      --secondary: #666;
      --secondary-glow: rgba(0,0,0,0.04);
      --green: #16a34a;
      --green-glow: rgba(22, 163, 74, 0.08);
      --yellow: #ca8a04;
      --red: #dc2626;
      --red-glow: rgba(220, 38, 38, 0.08);
      --gold: #111;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
      --shadow-glow: none;
      --region-stroke: #00ff00;
      --region-stroke-selected: #dc2626;
      --region-label-bg: #00ff00;
      --region-label-selected-bg: #dc2626;
      --region-label-text: #000;
      --region-label-selected-text: white;
      --comment-user-color: #111;
      --comment-claude-color: #16a34a;
      --grain-opacity: 0;
      --topbar-accent-line: none;
      --logo-gradient: none;
      --accent-gradient: #111;
      --accent-gradient-alt: #111;
      --chat-user-bg: #111;
      --chat-user-text: #fff;
      --chat-icon-bg: #111;
      --chat-icon-fill: #fff;
      --nav-btn-bg: rgba(0,0,0,0.04);
      --nav-btn-border: rgba(0,0,0,0.1);
      --nav-btn-hover-bg: rgba(0,0,0,0.1);
      --nav-btn-color: #111;
      --modal-overlay: rgba(0,0,0,0.3);
      --scrollbar-thumb: #ccc;
      --preview-radial: transparent;
      --hover-overlay: rgba(0,0,0,0.04);
      --hover-overlay-strong: rgba(0,0,0,0.08);
      --shimmer-base: rgba(0,0,0,0.03);
      --shimmer-highlight: rgba(0,0,0,0.06);
      --spinner-track: rgba(0,0,0,0.08);
      --code-bg: rgba(0,0,0,0.04);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Subtle grain texture overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: var(--grain-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  /* ── Top Bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 56px;
    position: relative;
  }
  .topbar::after { display: none; }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }
  .topbar-logo {
    font-weight: 700;
    font-size: 14px;
    white-space: nowrap;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .topbar-folder {
    font-size: 11px;
    color: var(--text-muted);
    overflow: visible;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'SF Mono', ui-monospace, monospace;
    opacity: 0.7;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s, opacity 0.15s;
    position: relative;
  }
  .topbar-folder:hover { opacity: 1; background: var(--surface-2); }
  .folder-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-lg, 0 8px 24px rgba(0,0,0,0.3));
    min-width: 360px;
    max-width: 500px;
    z-index: 100;
    overflow: hidden;
    display: none;
  }
  .folder-dropdown.open { display: block; }
  .folder-dropdown-header {
    padding: 10px 12px 6px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .folder-dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'SF Mono', ui-monospace, monospace;
    transition: background 0.1s;
  }
  .folder-dropdown-item:hover { background: var(--hover-overlay); }
  .folder-dropdown-item.active { color: var(--accent); }
  .folder-dropdown-item .folder-item-path {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .folder-dropdown-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }
  .folder-dropdown-item i { font-size: 14px; flex-shrink: 0; color: var(--text-muted); }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .topbar-right .btn-ghost {
    border: none;
    padding: 6px;
  }
  #btn-index-status {
    position: relative;
  }
  .index-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-tertiary);
    transition: background 0.3s;
  }
  .index-dot.green { background: #22c55e; }
  .index-dot.yellow { background: #eab308; animation: pulse-dot 1.2s ease-in-out infinite; }
  .index-dot.gray { background: var(--text-tertiary); }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .btn {
    padding: 7px 14px;
    border: none;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    font-family: inherit;
    letter-spacing: -0.01em;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-on);
    font-weight: 600;
  }
  .btn-primary:hover {
    background: var(--accent-hover);
  }
  .btn-primary:active { opacity: 0.8; }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-strong);
  }
  .btn-ghost:hover {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--border-strong);
  }

  /* ── Breadcrumb Bar ── */
  .breadcrumb-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 20px;
    height: 39px;
    box-sizing: border-box;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .breadcrumb-item {
    color: var(--text-muted);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 6px;
    transition: all 0.15s;
    white-space: nowrap;
    font-size: 11px;
    font-weight: 500;
  }
  .breadcrumb-item:hover { color: var(--text); background: var(--surface-2); }
  .breadcrumb-item.current { color: var(--text); cursor: default; font-weight: 500; }
  .breadcrumb-item.current:hover { background: transparent; }
  .breadcrumb-sep { color: var(--text-subtle); user-select: none; font-size: 10px; }
  .orphan-banner {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: rgba(251, 191, 36, 0.06);
    border-bottom: 1px solid rgba(251, 191, 36, 0.12);
    font-size: 12px;
    color: var(--yellow);
  }
  .orphan-banner.active { display: flex; }
  .orphan-banner button {
    padding: 3px 12px;
    border-radius: 6px;
    border: 1px solid rgba(251, 191, 36, 0.3);
    background: transparent;
    color: var(--yellow);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
  }
  .orphan-banner button:hover { background: rgba(251, 191, 36, 0.12); }

  /* ── Folder Grid Items ── */
  .grid-item.folder {
    border-style: dashed;
    border-color: var(--border);
  }
  .grid-item.folder:hover {
    border-color: var(--border-strong);
  }
  .grid-item.folder .grid-thumb-placeholder {
    font-size: 36px;
    background: linear-gradient(145deg, var(--surface-2), var(--surface));
  }
  .grid-item.folder .grid-meta {
    color: var(--text-muted);
  }

  /* ── Overview Grid ── */
  .overview {
    padding: 24px;
    height: calc(100vh - 56px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--surface-3) transparent;
  }
  .overview::-webkit-scrollbar { width: 6px; }
  .overview::-webkit-scrollbar-track { background: transparent; }
  .overview::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    align-items: center;
  }
  .search-input {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    width: 180px;
    outline: none;
    transition: all 0.2s;
  }
  .search-input:focus {
    border-color: var(--text-muted);
    background: var(--surface-2);
  }
  .search-input::placeholder { color: var(--text-subtle); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 14px;
  }
  .grid-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .grid-item:hover {
    border-color: var(--border-strong);
  }
  .grid-thumb {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: var(--surface-2);
  }
  .grid-thumb-placeholder {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, var(--surface-2), var(--surface));
    color: var(--text-muted);
    font-size: 28px;
  }
  .grid-info {
    padding: 10px 12px;
  }
  .grid-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .grid-meta {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: -0.01em;
  }

  /* ── Gallery Mode ── */
  .gallery {
    display: none;
    height: calc(100vh - 56px);
  }
  .gallery.active { display: flex; }

  .gallery-preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: var(--bg);
    position: relative;
    min-width: 0;
  }
  #preview-content {
    width: 100%;
    height: 100%;
  }
  .gallery-preview img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }

  /* ── Zoom/Pan container ── */
  .zoom-container {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    cursor: crosshair;
  }
  .zoom-container img {
    position: absolute;
    transform-origin: 0 0;
    max-width: none;
    max-height: none;
    border-radius: 4px;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── Region overlay ── */
  .region-overlay {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    pointer-events: none;
    overflow: visible;
  }
  .region-overlay.draw-mode rect[data-region-idx] { cursor: crosshair !important; }
  .region-rect-drawing {
    fill: none;
    stroke: var(--region-stroke);
    stroke-width: 5;
    stroke-dasharray: 10 5;
  }
  .region-rect-staged {
    fill: none;
    stroke: var(--region-stroke);
    stroke-width: 5;
    stroke-dasharray: 10 5;
  }
  .region-rect-hover {
    fill: none;
    stroke: var(--secondary);
    stroke-width: 5;
  }
  .region-rect-persistent {
    fill: none;
    stroke: var(--region-stroke);
    stroke-width: 3;
    opacity: 0.7;
  }
  .region-rect-focused {
    fill: none;
    stroke: var(--region-stroke);
    stroke-width: 5;
    opacity: 1;
  }
  .region-rect-selected {
    fill: var(--red-glow);
    stroke: var(--region-stroke-selected);
    stroke-width: 4;
    stroke-dasharray: 8 4;
    opacity: 1;
  }
  .region-rect-dimmed {
    fill: none;
    stroke: var(--region-stroke);
    stroke-width: 2;
    opacity: 0.15;
  }
  .canvas-tool-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--nav-btn-bg);
    border: 1px solid var(--nav-btn-border);
    color: var(--nav-btn-color);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .canvas-tool-btn:hover {
    background: var(--nav-btn-hover-bg);
    border-color: var(--border-strong);
  }
  .canvas-tool-btn.off { opacity: 0.4; }
  .canvas-tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .canvas-tool-btn.loading { animation: pulse 1s ease-in-out infinite; }
  .region-indicator {
    display: inline-block;
    margin-left: 6px;
    font-size: 11px;
    color: var(--secondary);
    cursor: default;
    vertical-align: middle;
  }
  .region-clear {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    margin-bottom: 6px;
  }
  .region-clear .region-clear-x {
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
  }
  .btn-claude-region {
    background: var(--surface-2);
    color: var(--text-muted);
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    cursor: pointer;
    margin-left: 4px;
  }
  .btn-claude-region:hover { background: var(--surface-3); color: var(--text); }
  .btn-claude-region:disabled { opacity: 0.5; cursor: wait; }
  .export-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 4px;
    min-width: 160px;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }
  .export-option {
    display: block;
    width: 100%;
    padding: 8px 14px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    transition: all 0.12s;
  }
  .export-option:hover { background: var(--hover-overlay); color: var(--text); }
  .gallery-preview .file-placeholder {
    text-align: center;
    color: var(--text-muted);
  }
  .gallery-preview .file-placeholder .icon { font-size: 64px; margin-bottom: 12px; }
  .gallery-preview .file-placeholder .name { font-size: 16px; }

  .text-preview {
    width: 100%;
    height: 100%;
    overflow: auto;
    padding: 32px 40px;
    box-sizing: border-box;
  }
  .text-preview pre {
    margin: 0;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    tab-size: 4;
  }

  /* Spreadsheet viewer */
  .spreadsheet-preview {
    width: 100%; height: 100%;
    overflow: auto; box-sizing: border-box;
    display: flex; flex-direction: column;
  }
  .spreadsheet-tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    padding: 0 16px; flex-shrink: 0; background: var(--bg);
    overflow-x: auto;
  }
  .spreadsheet-tab {
    padding: 8px 16px; font-size: 12px; font-weight: 500;
    color: var(--text-secondary); background: none; border: none;
    cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap; transition: all 0.15s;
  }
  .spreadsheet-tab:hover { color: var(--text); }
  .spreadsheet-tab.active {
    color: var(--text); border-bottom-color: var(--accent, #4a9eff);
  }
  .spreadsheet-truncated {
    padding: 6px 16px; font-size: 11px; color: var(--text-secondary);
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .spreadsheet-table-wrap {
    flex: 1; overflow: auto; padding: 0;
  }
  .spreadsheet-table {
    border-collapse: collapse; width: max-content; min-width: 100%;
    font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .spreadsheet-table thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--bg-secondary); color: var(--text);
    padding: 6px 14px; text-align: left; font-weight: 600;
    border-bottom: 2px solid var(--border); white-space: nowrap;
    font-size: 12px;
  }
  .spreadsheet-table tbody tr:nth-child(even) {
    background: rgba(128,128,128,0.04);
  }
  .spreadsheet-table tbody tr:hover {
    background: rgba(128,128,128,0.08);
  }
  .spreadsheet-table td {
    padding: 4px 14px; border-bottom: 1px solid var(--border);
    white-space: nowrap; max-width: 300px;
    overflow: hidden; text-overflow: ellipsis;
    color: var(--text); font-size: 12px;
  }
  .spreadsheet-table .row-num {
    color: var(--text-secondary); font-size: 11px;
    text-align: right; padding-right: 8px; min-width: 30px;
    background: var(--bg-secondary); border-right: 1px solid var(--border);
    position: sticky; left: 0; z-index: 1;
  }
  .spreadsheet-table thead th.row-num {
    z-index: 3; /* above both sticky row nums and sticky headers */
  }

  /* Document (docx) viewer */
  .docx-preview {
    width: 100%; height: 100%;
    overflow: auto; box-sizing: border-box;
  }
  .docx-content {
    max-width: 720px; margin: 0 auto;
    padding: 32px 40px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px; line-height: 1.7;
    color: var(--text);
  }
  .docx-heading { margin: 1.2em 0 0.4em; font-weight: 700; color: var(--text); }
  .docx-content h1 { font-size: 24px; }
  .docx-content h2 { font-size: 20px; }
  .docx-content h3 { font-size: 17px; }
  .docx-content h4 { font-size: 15px; }
  .docx-paragraph { margin: 0 0 0.5em; }
  .docx-spacer { height: 0.5em; }
  .docx-list { margin: 0.3em 0 0.5em 1.5em; padding: 0; }
  .docx-list li { margin: 0.15em 0; }
  .docx-table-wrap { overflow-x: auto; margin: 0.8em 0; }
  .docx-table {
    border-collapse: collapse; width: 100%;
    font-size: 13px;
  }
  .docx-table td {
    border: 1px solid var(--border);
    padding: 6px 10px;
  }
  .docx-table tr:first-child td {
    font-weight: 600;
    background: var(--bg-secondary);
  }

  .gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--nav-btn-bg);
    border: 1px solid var(--nav-btn-border);
    color: var(--nav-btn-color);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .gallery-nav:hover {
    background: var(--nav-btn-hover-bg);
    border-color: var(--border-strong);
  }
  .gallery-nav.prev { left: 16px; }
  .gallery-nav.next { right: 16px; }

  .rotate-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    z-index: 2;
    display: flex;
    gap: 4px;
  }

  /* ── Sidebar ── */
  .gallery-sidebar {
    width: 380px;
    min-width: 260px;
    max-width: 60vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
    flex-shrink: 0;
  }
  .gallery-sidebar .comments-list::-webkit-scrollbar { width: 5px; }
  .gallery-sidebar .comments-list::-webkit-scrollbar-track { background: transparent; }
  .gallery-sidebar .comments-list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  .sidebar-resize-handle {
    position: absolute;
    left: -3px;
    top: 0;
    bottom: 0;
    width: 6px;
    cursor: col-resize;
    z-index: 10;
  }
  .sidebar-resize-handle:hover,
  .sidebar-resize-handle.active {
    background: var(--text-muted);
    opacity: 0.3;
  }
  .sidebar-header {
    padding: 7px 12px 7px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .sidebar-header-actions {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .sidebar-icon-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .sidebar-icon-btn:hover {
    background: var(--hover-overlay);
    color: var(--text);
  }
  .copy-dropdown {
    position: relative;
  }
  .copy-dropdown-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    z-index: 100;
    min-width: 200px;
    padding: 4px;
  }
  .copy-dropdown.open .copy-dropdown-menu {
    display: block;
  }
  .copy-dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 8px 10px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .copy-dropdown-item:hover {
    background: var(--hover-overlay);
  }
  .sidebar-filename {
    font-size: 14px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 600;
    word-break: break-all;
    letter-spacing: -0.02em;
  }

  .comments-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .comment {
    margin-bottom: 10px;
    padding: 12px 14px;
    border-radius: var(--radius);
    background: var(--surface-2);
    border: 1px solid var(--border);
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }
  .comment:hover {
    border-color: var(--border-strong);
    background: var(--surface-3);
  }
  .comment:hover .comment-delete { opacity: 1; }
  .comment-author {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
    font-family: 'SF Mono', ui-monospace, monospace;
  }
  .comment-author.user { color: var(--text); }
  .comment-author.claude { color: var(--green); }
  .comment-text {
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .comment-text-edit {
    display: block;
    width: 100%;
    padding: 0;
    background: transparent;
    border: none;
    border-left: 2px solid var(--text-muted);
    padding-left: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    box-sizing: border-box;
    white-space: pre-wrap;
  }
  .comment-edit-actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .comment-edit-actions .btn-save {
    padding: 3px 10px;
    font-size: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  .comment-edit-actions .btn-save:hover { background: var(--accent-hover); }
  .comment-edit-actions .btn-cancel {
    padding: 3px 10px;
    font-size: 11px;
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  .comment-edit-actions .btn-cancel:hover { color: var(--text); }
  .comment-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .comment-attachments {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .comment-att-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px 3px 3px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-muted);
    transition: background 0.15s;
    max-width: 160px;
  }
  .comment-att-chip:hover { background: var(--hover-overlay); color: var(--text); }
  .comment-att-chip img.comment-att-img {
    width: 28px;
    height: 28px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .comment-att-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .comment-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .comment:hover .comment-actions { opacity: 1; }
  .comment-action-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .comment-action-btn:hover { color: var(--text); background: var(--hover-overlay); }
  .comment-action-btn.delete:hover { color: var(--red); }

  /* Fix formatting loading state */
  @keyframes fixingPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .comment.fixing {
    animation: fixingPulse 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  .comment.fixing .comment-text {
    animation: fixingPulse 1.2s ease-in-out infinite;
    color: var(--text-muted);
  }
  .comment-fix-spinner {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .comment-fix-spinner svg {
    animation: spin 0.8s linear infinite;
  }

  .no-comments {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 32px 16px;
  }

  .sidebar-input {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    position: relative;
  }
  .comment-input {
    display: block;
    width: 100%;
    margin: 0;
    padding: 7px 36px 7px 14px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    line-height: 20px;
    min-height: 36px;
    font-family: inherit;
    resize: none;
    box-sizing: border-box;
    overflow: hidden;
    field-sizing: content;
    outline: none;
    transition: border-color 0.15s;
  }
  .comment-input:focus {
    border-color: var(--text-muted);
  }
  .comment-input::placeholder { color: var(--text-subtle); }

  .btn-mic {
    position: absolute;
    right: 6px;
    bottom: 4px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .btn-mic:hover { color: var(--text); background: var(--hover-overlay); }
  .btn-mic.recording {
    background: var(--red);
    color: white;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .btn-send {
    width: 36px;
    min-width: 36px;
    height: 36px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: var(--accent-on);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-send:hover {
    background: var(--accent-hover);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
  }
  .voice-status {
    font-size: 11px;
    color: var(--text-muted);
  }
  .voice-status:not(:empty) {
    margin-top: 4px;
  }
  .voice-status.recording { color: var(--red); }



  /* ── Settings Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--modal-overlay);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 420px;
    max-width: 90vw;
    box-shadow: var(--shadow-lg);
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .modal-field input {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
  }
  .modal-field input:focus { outline: none; border-color: var(--text-muted); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-status {
    font-size: 12px;
    color: var(--green);
    margin-bottom: 8px;
  }

  /* ── Summary Siderail ── */
  .overview-container {
    height: calc(100vh - 56px - 39px);
    overflow-y: auto;
  }
  .overview-container.hidden { display: none; }
  .summary-siderail {
    width: 420px;
    position: fixed;
    top: 0;
    right: 0;
    height: 100vh;
    background: var(--surface);
    box-shadow: -1px 0 0 var(--border);
    display: flex;
    flex-direction: column;
    z-index: 50;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .summary-siderail.active { transform: translateX(0); }
  body.summary-open .topbar,
  body.summary-open .breadcrumb-bar,
  body.summary-open .orphan-banner,
  body.summary-open .overview-container,
  body.summary-open .gallery { margin-right: 420px; }
  .summary-header {
    padding: 0 16px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
  }
  .summary-header-title {
    font-size: 13px;
    font-weight: 600;
  }
  .summary-header-actions {
    display: flex;
    gap: 6px;
  }
  .summary-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .summary-rendered {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }
  .summary-rendered h1 { font-size: 18px; margin: 0 0 12px 0; font-weight: 700; letter-spacing: -0.02em; }
  .summary-rendered h2 { font-size: 15px; margin: 16px 0 8px 0; font-weight: 600; letter-spacing: -0.01em; }
  .summary-rendered h3 { font-size: 14px; margin: 12px 0 6px 0; font-weight: 600; letter-spacing: -0.01em; }
  .summary-rendered p { margin: 0 0 8px 0; }
  .summary-rendered ul, .summary-rendered ol { margin: 0 0 8px 0; padding-left: 20px; }
  .summary-rendered li { margin-bottom: 4px; }
  .summary-rendered code {
    background: var(--surface-2);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 12px;
  }
  .summary-rendered pre {
    background: var(--surface-2);
    padding: 12px;
    border-radius: var(--radius);
    overflow-x: auto;
    margin: 0 0 8px 0;
  }
  .summary-rendered pre code { background: none; padding: 0; }

  /* ── Summary reference links ── */
  .summary-rendered a.ref-comment,
  .summary-rendered a.ref-image {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
    border-bottom: 1px dotted var(--border-strong);
    transition: all 0.15s;
  }
  .summary-rendered a.ref-comment:hover,
  .summary-rendered a.ref-image:hover {
    color: var(--accent-hover);
    border-bottom-color: var(--accent-hover);
  }
  .summary-rendered a.ref-comment::before {
    content: '\01F4AC\00A0';
    font-size: 11px;
  }
  .summary-rendered a.ref-image::before {
    content: '\01F5BC\00A0';
    font-size: 11px;
  }
  .ref-error-tooltip {
    position: fixed;
    background: var(--red);
    color: white;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    z-index: 200;
    pointer-events: none;
    animation: refFadeOut 2s forwards;
  }
  @keyframes refFadeOut {
    0%, 70% { opacity: 1; }
    100% { opacity: 0; }
  }
  .comment.highlight-flash {
    animation: commentFlash 1.5s ease-out;
  }
  @keyframes commentFlash {
    0% { background: var(--accent); }
    100% { background: var(--surface-2); }
  }
  .summary-editor {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border: none;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 16px;
    resize: none;
    outline: none;
  }
  .summary-empty {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 80px 32px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .summary-empty-icon {
    color: var(--text-subtle);
    margin-bottom: 8px;
  }
  .summary-empty-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .summary-empty-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    max-width: 280px;
    margin-bottom: 14px;
  }
  .summary-empty-buttons {
    display: flex;
    gap: 8px;
  }
  .summary-empty-buttons .btn {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .summary-version-dropdown,
  .summary-regen-dropdown {
    position: relative;
  }
  .summary-version-menu,
  .summary-regen-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    z-index: 100;
    min-width: 160px;
    padding: 4px;
  }
  .summary-version-dropdown.open .summary-version-menu,
  .summary-regen-dropdown.open .summary-regen-menu {
    display: block;
  }
  .summary-version-item,
  .summary-regen-item {
    display: block;
    width: 100%;
    padding: 8px 10px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    text-align: left;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .summary-version-item:hover,
  .summary-regen-item:hover {
    background: var(--hover-overlay);
  }
  .summary-version-item.active {
    color: var(--accent);
    font-weight: 600;
  }
  .summary-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 20px;
  }
  .summary-loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--spinner-track);
    border-top-color: var(--text-muted);
    border-radius: 50%;
    animation: summary-spin 0.8s linear infinite;
  }
  @keyframes summary-spin { to { transform: rotate(360deg); } }
  .summary-loading-text {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.5;
  }
  .summary-loading-step {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.8;
    margin-top: 4px;
  }
  .summary-loading-shimmer {
    width: 100%;
    max-width: 240px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }
  .shimmer-line {
    height: 10px;
    background: linear-gradient(90deg, var(--shimmer-base) 25%, var(--shimmer-highlight) 50%, var(--shimmer-base) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: 4px;
  }
  .shimmer-line:nth-child(2) { width: 85%; }
  .shimmer-line:nth-child(3) { width: 70%; }
  .shimmer-line:nth-child(4) { width: 90%; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ── Chat Panel ── */
  /* ── Chat Right Panel ── */
  .chat-panel {
    width: 420px;
    min-width: 420px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    z-index: 50;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    box-shadow: -1px 0 0 var(--border);
  }
  .chat-panel.open {
    transform: translateX(0);
    pointer-events: auto;
  }
  /* Push all content when chat is open */
  .topbar,
  .breadcrumb-bar,
  .orphan-banner,
  .overview-container,
  .gallery { transition: margin-right 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
  body.chat-open .topbar,
  body.chat-open .breadcrumb-bar,
  body.chat-open .orphan-banner,
  body.chat-open .overview-container,
  body.chat-open .gallery { margin-right: 420px; }

  .chat-history-bar {
    display: flex;
    align-items: center;

      <button class="sidebar-icon-btn summary-has-content" id="btn-summary-copy" title="Copy" style="display:none">
        <i class="ph ph-copy" style="font-size:16px"></i>
      </button>
      <div class="summary-version-dropdown summary-has-content" id="summary-version-dropdown" style="display:none">
        <button class="sidebar-icon-btn" id="btn-version-toggle" title="Version history">
          <i class="ph ph-clock-counter-clockwise" style="font-size:16px"></i>
        </button>
        <div class="summary-version-menu" id="summary-version-menu">
          <div class="summary-version-list" id="summary-version-list"></div>
        </div>
      </div>
      <div class="summary-regen-dropdown summary-has-content" id="summary-regen-dropdown" style="display:none">
        <button class="sidebar-icon-btn" id="btn-regenerate-toggle" title="Resummarize">
          <i class="ph ph-arrow-clockwise" style="font-size:16px"></i>
        </button>
        <div class="summary-regen-menu" id="summary-regen-menu">
          <button class="summary-regen-item" id="btn-regen-dir">Summarize this directory</button>
          <button class="summary-regen-item" id="btn-regen-all">Summarize all subdirectories</button>
        </div>
      </div>
      <button class="sidebar-icon-btn" id="btn-summary-close" title="Close summary">
        <i class="ph ph-x" style="font-size:16px"></i>
      </button>
    </div>
  </div>
  <div class="summary-content" id="summary-content">
    <div class="summary-empty">No summary yet. Click "Generate" to create one.</div>
  </div>
</div>

<!-- Gallery Mode -->
<div class="gallery" id="gallery">
  <div class="gallery-preview" id="preview-area">
    <button class="gallery-nav prev" id="nav-prev">&#8249;</button>
    <div id="preview-content"></div>
    <button class="gallery-nav next" id="nav-next">&#8250;</button>
    <div class="rotate-controls">
      <button class="canvas-tool-btn" id="btn-toggle-annotations" title="Toggle annotations">
        <i class="ph ph-eye" style="font-size:18px"></i>
      </button>
      <button class="canvas-tool-btn" id="btn-auto-annotate" title="Auto-annotate with Claude">
        <i class="ph ph-sparkle" style="font-size:18px"></i>
      </button>
      <button class="canvas-tool-btn" id="btn-rotate-ccw" title="Rotate left [">
        <i class="ph ph-arrow-counter-clockwise" style="font-size:18px"></i>
      </button>
      <button class="canvas-tool-btn" id="btn-rotate-cw" title="Rotate right ]">
        <i class="ph ph-arrow-clockwise" style="font-size:18px"></i>
      </button>
    </div>
  </div>
  <div class="gallery-sidebar" id="gallery-sidebar">
    <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
    <div class="sidebar-header">
      <div class="sidebar-filename" id="sidebar-filename" ondblclick="startRename()" title="Double-click to rename"></div>
      <div class="sidebar-header-actions">
        <button class="sidebar-icon-btn" id="btn-reveal-finder" title="Reveal in Finder">
          <i class="ph ph-folder-open" style="font-size:16px"></i>
        </button>
        <div class="copy-dropdown" id="copy-dropdown">
          <button class="sidebar-icon-btn" id="btn-copy-menu" title="Copy image">
            <i class="ph ph-copy" style="font-size:16px"></i>
          </button>

          <div class="copy-dropdown-menu" id="copy-dropdown-menu">
            <button class="copy-dropdown-item" id="btn-copy-image">
              <i class="ph ph-image" style="font-size:14px"></i>
              Copy image
            </button>
            <button class="copy-dropdown-item" id="btn-copy-context">
              <i class="ph ph-image-square" style="font-size:14px"></i>
              Copy image + annotations
            </button>
            <button class="copy-dropdown-item" id="btn-copy-chat">
              <i class="ph ph-chat-text" style="font-size:14px"></i>
              Copy chat
            </button>
          </div>
        </div>
        <button class="sidebar-icon-btn" id="btn-back" title="Close">
          <i class="ph ph-x" style="font-size:16px"></i>
        </button>
      </div>
    </div>
    <div class="comments-list" id="comments-list"></div>
    <div class="sidebar-input">
      <div class="chat-attachments" id="sidebar-attachments" style="display:none"></div>
      <div class="input-row">
        <div style="position:relative">
          <button class="chat-attach-btn" id="sidebar-attach-btn" title="Attach images">
            <i class="ph ph-paperclip" style="font-size:16px"></i>
          </button>
          <div class="chat-attach-menu" id="sidebar-attach-menu">
            <button class="chat-attach-option" id="sidebar-attach-project">
              <i class="ph ph-image" style="font-size:14px"></i>
              From project files
            </button>
            <button class="chat-attach-option" id="sidebar-attach-upload">
              <i class="ph ph-upload-simple" style="font-size:14px"></i>
              Upload from device
            </button>
          </div>
        </div>
        <div class="input-wrap">
          <textarea class="comment-input" id="comment-input" placeholder="Add your context..." rows="1"></textarea>
          <button class="btn-mic" id="btn-mic" title="Voice input"><i class="ph ph-microphone" style="font-size:16px"></i></button>
        </div>
        <button class="btn-send" id="btn-add-comment" title="Add comment">
          <i class="ph ph-paper-plane-tilt" style="font-size:18px"></i>
        </button>
      </div>
      <div class="voice-status" id="voice-status"></div>
      <input type="file" id="sidebar-file-upload" accept="image/*" multiple style="display:none">
    </div>
  </div>
</div>

<!-- Chat Right Panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <div class="chat-header-left">
      <span class="chat-header-title">Chat</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="chat-copy-all" id="chat-copy-all" title="Copy entire conversation">
        <i class="ph ph-copy" style="font-size:14px"></i>
        <span class="chat-copy-all-tooltip" id="chat-copy-all-tooltip">Copied!</span>
      </button>
      <button class="chat-close-btn" id="chat-close-btn" title="Close chat">
        <i class="ph ph-x" style="font-size:16px"></i>
      </button>
    </div>
  </div>
  <div class="chat-history-bar" id="chat-history-bar">
    <button class="chat-new-btn" id="chat-new-btn" title="New chat">+ New</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">
        <i class="ph ph-sparkle" style="font-size:20px;color:var(--text-muted)"></i>
      </div>
      <div class="chat-empty-title">Ask about your files</div>
      <div class="chat-empty-desc">Chat with Claude about your annotations, patterns, and design decisions.</div>
      <div class="chat-suggestions" id="chat-suggestions">
        <button class="chat-suggestion">What patterns do you see across annotations?</button>
        <button class="chat-suggestion">Which files still need annotation?</button>
        <button class="chat-suggestion">Summarize the key decisions made so far</button>
        <button class="chat-suggestion">What components have been identified?</button>
      </div>
    </div>
  </div>
  <div class="chat-attachments" id="chat-attachments" style="display:none"></div>
  <div class="chat-input-area">
    <div class="chat-input-row">
      <div style="position:relative">
        <button class="chat-attach-btn" id="chat-attach-btn" title="Attach files">
          <i class="ph ph-paperclip" style="font-size:16px"></i>
        </button>
        <div class="chat-attach-menu" id="chat-attach-menu">
          <button class="chat-attach-option" id="chat-attach-project">
            <i class="ph ph-image" style="font-size:14px"></i>
            From project files
          </button>
          <button class="chat-attach-option" id="chat-attach-upload">
            <i class="ph ph-upload-simple" style="font-size:14px"></i>
            Upload from device
          </button>
        </div>
      </div>
      <div class="input-wrap">
        <textarea class="chat-input" id="chat-input" placeholder="Ask about your files..." rows="1"></textarea>
        <button class="btn-mic" id="chat-mic" title="Voice input"><i class="ph ph-microphone" style="font-size:16px"></i></button>
      </div>
      <button class="chat-send-btn" id="chat-send" title="Send">
        <i class="ph ph-paper-plane-tilt" style="font-size:16px"></i>
      </button>
    </div>
  </div>
  <input type="file" id="chat-file-upload" accept="image/*" multiple style="display:none">
</div>

<!-- Settings Modal -->
<!-- Index Status Panel -->
<div class="modal-overlay" id="index-modal">
  <div class="modal">
    <h3>Search Index</h3>
    <div id="index-stats" style="margin:12px 0;font-size:13px;color:var(--text-secondary);line-height:1.8">
      Loading...
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('index-modal').classList.remove('active')">Close</button>
      <button class="btn btn-primary" id="btn-reindex" onclick="reindexProject()">Rebuild Index</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>Settings</h3>
    <div class="modal-status" id="settings-status"></div>
    <div class="modal-field">
      <label>Anthropic API Key</label>
      <input type="password" id="settings-api-key" placeholder="sk-ant-...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="settings-cancel">Cancel</button>
      <button class="btn btn-primary" id="settings-save">Save</button>
    </div>
  </div>
</div>
