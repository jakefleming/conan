<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Annotator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e5e5e5;
    --text-muted: #888;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── Top Bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 56px;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .topbar-logo {
    font-weight: 700;
    font-size: 14px;
    white-space: nowrap;
    letter-spacing: -0.02em;
  }
  .topbar-folder {
    font-size: 12px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-text {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .btn {
    padding: 6px 14px;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-2); color: var(--text); }

  /* ── Breadcrumb Bar ── */
  .breadcrumb-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    min-height: 32px;
  }
  .breadcrumb-item {
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .breadcrumb-item:hover { color: var(--text); background: var(--surface-2); }
  .breadcrumb-item.current { color: var(--text); cursor: default; }
  .breadcrumb-item.current:hover { background: transparent; }
  .breadcrumb-sep { color: var(--border); user-select: none; font-size: 11px; }
  .orphan-banner {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 20px;
    background: rgba(234, 179, 8, 0.1);
    border-bottom: 1px solid rgba(234, 179, 8, 0.2);
    font-size: 12px;
    color: var(--yellow);
  }
  .orphan-banner.active { display: flex; }
  .orphan-banner button {
    padding: 2px 10px;
    border-radius: 4px;
    border: 1px solid var(--yellow);
    background: transparent;
    color: var(--yellow);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .orphan-banner button:hover { background: rgba(234, 179, 8, 0.15); }

  /* ── Folder Grid Items ── */
  .grid-item.folder {
    border-style: dashed;
  }
  .grid-item.folder .grid-thumb-placeholder {
    font-size: 36px;
  }
  .grid-item.folder .grid-meta {
    color: var(--text-muted);
  }

  /* ── Overview Grid ── */
  .overview {
    padding: 20px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .search-input {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: inherit;
    width: 160px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .filter-btn:hover:not(.active) { background: var(--surface-2); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .grid-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
  }
  .grid-item:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .grid-thumb {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: var(--surface-2);
  }
  .grid-thumb-placeholder {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface-2);
    color: var(--text-muted);
    font-size: 28px;
  }
  .grid-info {
    padding: 8px 10px;
  }
  .grid-name {
    font-size: 11px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .grid-meta {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .status-dot.pending { background: var(--yellow); }
  .status-dot.annotated { background: var(--green); }
  .status-dot.skipped { background: var(--text-muted); }

  /* ── Gallery Mode ── */
  .gallery {
    display: none;
    height: calc(100vh - 56px);
  }
  .gallery.active { display: flex; }

  .gallery-preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: var(--bg);
    position: relative;
    min-width: 0;
  }
  #preview-content {
    width: 100%;
    height: 100%;
  }
  .gallery-preview img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }

  /* ── Zoom/Pan container ── */
  .zoom-container {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    cursor: crosshair;
  }
  .zoom-container img {
    position: absolute;
    transform-origin: 0 0;
    max-width: none;
    max-height: none;
    border-radius: 4px;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── Region overlay ── */
  .region-overlay {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    pointer-events: none;
    overflow: visible;
  }
  .region-overlay.draw-mode rect[data-region-idx] { cursor: crosshair !important; }
  .region-rect-drawing {
    fill: none;
    stroke: #00ff66;
    stroke-width: 5;
    stroke-dasharray: 10 5;
  }
  .region-rect-staged {
    fill: none;
    stroke: #00ff66;
    stroke-width: 5;
    stroke-dasharray: 10 5;
  }
  .region-rect-hover {
    fill: none;
    stroke: #ff00ff;
    stroke-width: 5;
  }
  .region-rect-persistent {
    fill: none;
    stroke: #00ff66;
    stroke-width: 3;
    opacity: 0.7;
  }
  .region-rect-focused {
    fill: none;
    stroke: #00ff66;
    stroke-width: 5;
    opacity: 1;
  }
  .region-rect-selected {
    fill: rgba(255, 68, 68, 0.1);
    stroke: #ff4444;
    stroke-width: 4;
    stroke-dasharray: 8 4;
    opacity: 1;
  }
  .region-rect-dimmed {
    fill: none;
    stroke: #00ff66;
    stroke-width: 2;
    opacity: 0.15;
  }
  .canvas-tool-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, opacity 0.15s;
  }
  .canvas-tool-btn:hover { background: rgba(255,255,255,0.2); }
  .canvas-tool-btn.off { opacity: 0.4; }
  .canvas-tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .canvas-tool-btn.loading { animation: pulse 1s ease-in-out infinite; }
  .region-indicator {
    display: inline-block;
    margin-left: 6px;
    font-size: 11px;
    color: var(--accent);
    cursor: default;
    vertical-align: middle;
  }
  .region-clear {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--accent);
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid var(--accent);
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .region-clear .region-clear-x {
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
  }
  .btn-claude-region {
    background: rgba(234, 179, 8, 0.15);
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    cursor: pointer;
    margin-left: 4px;
  }
  .btn-claude-region:hover { background: rgba(234, 179, 8, 0.3); }
  .btn-claude-region:disabled { opacity: 0.5; cursor: wait; }
  .export-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 4px 0;
    min-width: 160px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .export-option {
    display: block;
    width: 100%;
    padding: 8px 14px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    text-align: left;
    cursor: pointer;
  }
  .export-option:hover { background: rgba(255,255,255,0.08); }
  .gallery-preview .file-placeholder {
    text-align: center;
    color: var(--text-muted);
  }
  .gallery-preview .file-placeholder .icon { font-size: 64px; margin-bottom: 12px; }
  .gallery-preview .file-placeholder .name { font-size: 16px; }

  .gallery-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    backdrop-filter: blur(8px);
  }
  .gallery-nav:hover { background: rgba(255,255,255,0.2); }
  .gallery-nav.prev { left: 16px; }
  .gallery-nav.next { right: 16px; }

  .rotate-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    z-index: 2;
    display: flex;
    gap: 4px;
  }

  /* ── Sidebar ── */
  .gallery-sidebar {
    width: 380px;
    min-width: 260px;
    max-width: 60vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
    flex-shrink: 0;
  }
  .sidebar-resize-handle {
    position: absolute;
    left: -3px;
    top: 0;
    bottom: 0;
    width: 6px;
    cursor: col-resize;
    z-index: 10;
  }
  .sidebar-resize-handle:hover,
  .sidebar-resize-handle.active {
    background: var(--accent);
    opacity: 0.4;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-filename {
    font-size: 14px;
    font-weight: 600;
    word-break: break-all;
  }
  .sidebar-position {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .sidebar-progress {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-top: 10px;
    border-radius: 1px;
  }
  .sidebar-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s;
  }

  .comments-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .comment {
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: var(--surface-2);
    position: relative;
    group: true;
  }
  .comment:hover .comment-delete { opacity: 1; }
  .comment-author {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .comment-author.user { color: var(--accent); }
  .comment-author.claude { color: var(--green); }
  .comment-text {
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .comment-text-edit {
    display: block;
    width: 100%;
    padding: 0;
    background: transparent;
    border: none;
    border-left: 2px solid var(--accent);
    padding-left: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    box-sizing: border-box;
    white-space: pre-wrap;
  }
  .comment-edit-actions {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .comment-edit-actions .btn-save {
    padding: 3px 10px;
    font-size: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  .comment-edit-actions .btn-save:hover { background: var(--accent-hover); }
  .comment-edit-actions .btn-cancel {
    padding: 3px 10px;
    font-size: 11px;
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  .comment-edit-actions .btn-cancel:hover { color: var(--text); }
  .comment-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .comment-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .comment:hover .comment-actions { opacity: 1; }
  .comment-action-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .comment-action-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .comment-action-btn.delete:hover { color: var(--red); }

  /* Fix formatting loading state */
  @keyframes fixingPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .comment.fixing {
    animation: fixingPulse 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  .comment.fixing .comment-text {
    animation: fixingPulse 1.2s ease-in-out infinite;
    color: var(--text-muted);
  }
  .comment-fix-spinner {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .comment-fix-spinner svg {
    animation: spin 0.8s linear infinite;
  }

  .no-comments {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 32px 16px;
  }

  .sidebar-input {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: end;
  }
  .input-wrap {
    flex: 1;
    position: relative;
  }
  .comment-input {
    display: block;
    width: 100%;
    margin: 0;
    padding: 8px 36px 8px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    line-height: 20px;
    font-family: inherit;
    resize: none;
    box-sizing: border-box;
    overflow: hidden;
    field-sizing: content;
  }
  .comment-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .comment-input::placeholder { color: var(--text-muted); }

  .btn-mic {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .btn-mic:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .btn-mic.recording {
    background: var(--red);
    color: white;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .btn-send {
    width: 38px;
    min-width: 38px;
    height: 38px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-send:hover { background: var(--accent-hover); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
  }
  .voice-status {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    min-height: 16px;
  }
  .voice-status.recording { color: var(--red); }


  .sidebar-tools {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tool-link {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .tool-link:hover {
    color: var(--text);
    background: var(--surface-2);
  }
  .tool-link.claude { color: var(--green); }
  .tool-link.claude:hover { color: #4ade80; background: rgba(34, 197, 94, 0.1); }
  .tool-link.annotate { color: #a78bfa; }
  .tool-link.annotate:hover { color: #c4b5fd; background: rgba(167, 139, 250, 0.1); }
  .tool-link:disabled { opacity: 0.4; cursor: not-allowed; }
  .tool-link.loading { animation: pulse 1s ease-in-out infinite; }
  .tool-sep {
    color: var(--border);
    font-size: 10px;
    user-select: none;
  }

  /* ── Settings Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 420px;
    max-width: 90vw;
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .modal-field input {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
  }
  .modal-field input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-status {
    font-size: 12px;
    color: var(--green);
    margin-bottom: 8px;
  }

  /* ── Summary Siderail ── */
  .overview-container {
    display: flex;
    height: calc(100vh - 56px - 32px);
  }
  .overview-container .overview {
    flex: 1;
    min-width: 0;
    height: auto;
    overflow-y: auto;
  }
  .overview-container.hidden { display: none; }
  .summary-siderail {

<script>
const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.heic', '.heif', '.svg'];
const FILE_ICONS = {
  '.pdf': '\u{1F4C4}', '.txt': '\u{1F4DD}', '.md': '\u{1F4DD}',
  '.doc': '\u{1F4C3}', '.docx': '\u{1F4C3}',
};

let files = [];
let currentIndex = 0;
let activeFilter = 'all';
let searchQuery = '';
let galleryMode = false;
let currentDir = '';
let orphanCount = 0;

// ── API helpers ──
async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  return res.json();
}

async function loadConfig() {
  const config = await api('/api/config');
  document.getElementById('folder-path').textContent = config.folder;
}

async function loadFiles() {
  const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
  const allEntries = await api(`/api/files${dirParam}`);
  files = allEntries;
  updateProgress();
  renderGrid();
  renderBreadcrumbs();
  checkOrphans();
}

function navigateToDir(dir) {
  currentDir = dir;
  location.hash = dir ? encodeURIComponent(dir) : '';
  loadFiles();
  // Reset summary state for new directory
  summaryRawContent = '';
  summaryLastModified = null;
  summaryCurrentVersion = null;
  summaryTotalVersions = 0;
  if (summaryVisible) {
    renderSummary(); // immediately show empty state for the new dir
    loadSummary();
    loadVersionList();
  }
}

function renderBreadcrumbs() {
  const bar = document.getElementById('breadcrumb-bar');
  if (!currentDir) {
    bar.innerHTML = '<span class="breadcrumb-item current">Root</span>';
    return;
  }
  const parts = currentDir.split('/');
  let html = '<span class="breadcrumb-item" onclick="navigateToDir(\'\')">Root</span>';
  let accumulated = '';
  parts.forEach((part, i) => {
    accumulated = accumulated ? accumulated + '/' + part : part;
    const isLast = i === parts.length - 1;
    html += `<span class="breadcrumb-sep">/</span>`;
    if (isLast) {
      html += `<span class="breadcrumb-item current">${escapeHtml(part)}</span>`;
    } else {
      const dir = accumulated;
      html += `<span class="breadcrumb-item" onclick="navigateToDir('${escapeAttr(dir)}')">${escapeHtml(part)}</span>`;
    }
  });
  bar.innerHTML = html;
}

async function checkOrphans() {
  try {
    const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
    const res = await api(`/api/orphans${dirParam}`);
    orphanCount = res.count || 0;
    const banner = document.getElementById('orphan-banner');
    if (orphanCount > 0) {
      document.getElementById('orphan-text').textContent = `${orphanCount} annotation${orphanCount > 1 ? 's don\'t' : ' doesn\'t'} match any file in this folder.`;
      banner.classList.add('active');
    } else {
      banner.classList.remove('active');
    }
  } catch {}
}

async function reconcileFiles() {
  const btn = document.getElementById('btn-reconcile');
  btn.disabled = true;
  btn.textContent = 'Reconciling...';
  try {
    const res = await api('/api/reconcile', { method: 'POST' });
    if (res.migrated?.length > 0) {
      alert(`Migrated ${res.migrated.length} annotation(s).${res.stillOrphaned ? ` ${res.stillOrphaned} still orphaned.` : ''}`);
    } else if (res.stillOrphaned > 0) {
      const clean = confirm(`No matching files found for ${res.stillOrphaned} orphaned annotation(s). Remove them?`);
      if (clean) {
        const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
        await api(`/api/orphans/clean${dirParam}`, { method: 'POST' });
      }
    }
    loadFiles();
  } catch (e) {
    alert('Reconcile failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Reconcile';
  }
}

function onlyFiles() {
  return files.filter(f => f.type === 'file');
}

function onlyDirs() {
  return files.filter(f => f.type === 'directory');
}

function filteredFiles() {
  let result = onlyFiles();
  if (activeFilter !== 'all') result = result.filter(f => f.status === activeFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    result = result.filter(f =>
      f.name.toLowerCase().includes(q) ||
      (f.comments || []).some(c => c.text.toLowerCase().includes(q))
    );
  }
  return result;
}

function updateProgress() {
  const fileItems = onlyFiles();
  const annotated = fileItems.filter(f => f.status === 'annotated').length;
  document.getElementById('progress-text').textContent = `${annotated}/${fileItems.length} annotated`;
}

// ── Grid View ──
function renderGrid() {
  const grid = document.getElementById('grid');
  const dirs = onlyDirs();
  const visible = filteredFiles();

  // Render directories first
  const dirHtml = dirs.map(d => `
    <div class="grid-item folder" onclick="navigateToDir('${escapeAttr(d.path)}')">
      <div class="grid-thumb-placeholder">\u{1F4C1}</div>
      <div class="grid-info">
        <div class="grid-name">${escapeHtml(d.name)}</div>
        <div class="grid-meta">${d.fileCount} file${d.fileCount !== 1 ? 's' : ''}${d.dirCount ? ` \u00B7 ${d.dirCount} folder${d.dirCount !== 1 ? 's' : ''}` : ''}${d.annotatedCount ? ` \u00B7 ${d.annotatedCount} annotated` : ''}</div>
      </div>
    </div>
  `).join('');

  const fileHtml = visible.map((file, i) => {
    const isImage = IMAGE_EXTS.includes(file.ext);
    const thumb = isImage
      ? `<img class="grid-thumb" src="/api/files/${encodeURIComponent(file.path)}/thumb" loading="lazy" alt="${file.name}">`
      : `<div class="grid-thumb-placeholder">${FILE_ICONS[file.ext] || '\u{1F4CE}'}</div>`;
    return `
      <div class="grid-item" data-filename="${escapeAttr(file.path)}" onclick="openFile('${escapeAttr(file.path)}')">
        ${thumb}
        <div class="grid-info">
          <div class="grid-name">${escapeHtml(file.name)}</div>
          <div class="grid-meta">
            <span class="status-dot ${file.status}"></span>
            ${file.status}${file.commentCount ? ` \u00B7 ${file.commentCount} comment${file.commentCount > 1 ? 's' : ''}` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  grid.innerHTML = dirHtml + fileHtml;
}

// ── Gallery View ──
function openFile(filePath) {
  const idx = onlyFiles().findIndex(f => f.path === filePath);
  if (idx === -1) return;
  currentIndex = idx;
  enterGallery();
}

function enterGallery(onRendered) {
  galleryMode = true;
  document.getElementById('overview-container').classList.add('hidden');
  document.getElementById('gallery').classList.add('active');
  document.getElementById('breadcrumb-bar').style.display = 'none';
  document.getElementById('orphan-banner').classList.remove('active');
  document.getElementById('btn-add-context').style.display = 'none';
  document.getElementById('btn-toggle-summary').style.display = 'none';
  document.getElementById('btn-back').style.display = '';
  updateChatFabVisibility();
  renderGalleryItem().then(() => {
    if (onRendered) onRendered();
  });
}

function exitGallery() {
  galleryMode = false;
  document.getElementById('overview-container').classList.remove('hidden');
  document.getElementById('gallery').classList.remove('active');
  document.getElementById('breadcrumb-bar').style.display = '';
  document.getElementById('btn-add-context').style.display = '';
  document.getElementById('btn-toggle-summary').style.display = '';
  document.getElementById('btn-back').style.display = 'none';
  updateChatFabVisibility();
  loadFiles();
}

async function renderGalleryItem() {
  selectedRegionIndex = null;
  const fileItems = onlyFiles();
  if (!fileItems[currentIndex]) return;
  const file = fileItems[currentIndex];
  const isImage = IMAGE_EXTS.includes(file.ext);

  // Reset annotation state on navigation
  stagedRegion = null;
  drawingRegion = null;
  hoveredCommentRegion = null;
  focusedCommentIndex = null;
  editingRegionIndex = null;
  editDragType = null;
  editStartMouse = null;
  editStartRegion = null;

  // Preview
  const previewEl = document.getElementById('preview-content');
  if (isImage) {
    previewEl.innerHTML = `<div class="zoom-container" id="zoom-container"><img src="/api/files/${encodeURIComponent(file.path)}/preview" alt="${file.name}" id="zoom-img"><svg class="region-overlay" id="region-overlay"></svg></div>`;
    initZoom();
  } else if (file.ext === '.pdf') {
    previewEl.innerHTML = `<iframe src="/api/files/${encodeURIComponent(file.path)}/preview" style="width:100%;height:100%;border:none;border-radius:4px"></iframe>`;
  } else {
    previewEl.innerHTML = `<div class="file-placeholder"><div class="icon">${FILE_ICONS[file.ext] || '\u{1F4CE}'}</div><div class="name">${file.name}</div></div>`;
  }

  // Sidebar info
  document.getElementById('sidebar-filename').textContent = file.name;
  document.getElementById('sidebar-position').textContent = `${currentIndex + 1} of ${fileItems.length}`;
  document.getElementById('sidebar-progress-fill').style.width = `${((currentIndex + 1) / fileItems.length) * 100}%`;

  // Load comments from file data we already have
  renderComments(file.path, file);

  // Clear input
  document.getElementById('comment-input').value = '';
}

// Light refresh: only update sidebar comments + region overlay without rebuilding the image
function refreshSidebar() {
  const fileItems = onlyFiles();
  if (!fileItems[currentIndex]) return;
  const file = fileItems[currentIndex];
  document.getElementById('sidebar-filename').textContent = file.name;
  document.getElementById('sidebar-position').textContent = `${currentIndex + 1} of ${fileItems.length}`;
  document.getElementById('sidebar-progress-fill').style.width = `${((currentIndex + 1) / fileItems.length) * 100}%`;
  renderComments(file.path, file);
  renderRegionOverlay();
}

// filename param is now a relative path (file.path)
function renderComments(filename, fileCtx) {
  const list = document.getElementById('comments-list');
  if (!fileCtx || fileCtx.comments.length === 0) {
    list.innerHTML = '<div class="no-comments">No comments yet. Add context for this file.</div>';
    return;
  }

  list.innerHTML = fileCtx.comments.map((c, i) => {

  list.querySelectorAll('.comment-action-btn.edit').forEach(btn => {

      const textEl = list.querySelector(`.comment-text[data-comment-idx="${idx}"]`);

      ta.style.height = Math.max(40, origHeight) + 'px';

      actions.className = 'comment-edit-actions';
      actions.innerHTML = '<button class="btn-save">Save</button><button class="btn-cancel">Cancel</button>';
      textEl.parentNode.insertBefore(actions, textEl.nextSibling);

      const cancel = () => {
        actions.remove();
        textEl.textContent = comment.text;
      };
      const save = async () => {
        const newText = ta.value.trim();
        if (newText && newText !== comment.text) {
          comment.text = newText;
          try {
            await api(`/api/files/${encodeURIComponent(filename)}/comments/${idx}/text`, {
              method: 'PUT',
              body: { text: newText },
            });
          } catch (err) {
            console.error('Failed to save comment edit:', err);
          }
        }
        actions.remove();
        textEl.textContent = comment.text;
      };

      actions.querySelector('.btn-save').addEventListener('click', save);
      actions.querySelector('.btn-cancel').addEventListener('click', cancel);
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { e.stopPropagation(); cancel(); }

  list.querySelectorAll('.comment-action-btn.fix').forEach(btn => {

    btn.addEventListener('click', async () => {
      const idx = parseInt(btn.dataset.idx, 10);
      const comment = fileCtx.comments[idx];
      if (!comment) return;
      const textEl = list.querySelector(`.comment-text[data-comment-idx="${idx}"]`);

      // If we have a stashed original, this click is an undo
      if (preFixText !== null) {
        const revertText = preFixText;
        preFixText = null;

        if (textEl) textEl.textContent = revertText;

      if (textEl) textEl.parentNode.insertBefore(spinnerEl, textEl.nextSibling);

      try {
        const res = await api(`/api/files/${encodeURIComponent(filename)}/comments/${idx}/fix`, { method: 'POST' });
        if (res.text) {

          if (textEl) textEl.textContent = res.text;

  list.querySelectorAll('.comment[data-region]').forEach((el, _, all) => {

  list.querySelectorAll('.comment:not([data-region])').forEach(el => {

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function reloadCurrentDir() {
  const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
  files = await api(`/api/files${dirParam}`);
  updateProgress();
}

async function addComment() {
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  const file = onlyFiles()[currentIndex];
  const body = { author: 'user', text };
  if (lastAudioFilename) body.audio = lastAudioFilename;
  if (stagedRegion) body.region = stagedRegion;
  await api(`/api/files/${encodeURIComponent(file.path)}/comments`, {
    method: 'POST',
    body,
  });
  input.value = '';
  lastAudioFilename = null;
  stagedRegion = null;
  updateStagedRegionUI();
  renderRegionOverlay();
  await reloadCurrentDir();
  refreshSidebar();
}

async function deleteComment(filename, index) {
  await api(`/api/files/${encodeURIComponent(filename)}/comments/${index}`, {
    method: 'DELETE',
  });
  await reloadCurrentDir();
  refreshSidebar();
}

async function skipFile() {
  const file = onlyFiles()[currentIndex];
  await api(`/api/files/${encodeURIComponent(file.path)}/status`, {
    method: 'PATCH',
    body: { status: 'skipped' },
  });
  await reloadCurrentDir();
  goNext();
}

function goNext() {
  const fileItems = onlyFiles();
  if (currentIndex < fileItems.length - 1) {
    currentIndex++;
    renderGalleryItem();
  }
}

function goPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    renderGalleryItem();
  }
}

// Start "Add Context" from first pending file
function startAddContext() {
  const fileItems = onlyFiles();
  const firstPending = fileItems.findIndex(f => f.status === 'pending');
  currentIndex = firstPending >= 0 ? firstPending : 0;
  enterGallery();
}

// ── Summary Reference Navigation ──
// filePath can be a relative path like "subdir/IMG_5210.jpeg" or just "IMG_5210.jpeg"
async function navigateToComment(filePath, commentIndex) {
  // If file is in a different directory, navigate there first
  const parts = filePath.split('/');
  const fileDir = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
  if (fileDir !== currentDir) {
    navigateToDir(fileDir);
    // Wait for files to load
    await new Promise(r => setTimeout(r, 300));
  }

  const fileItems = onlyFiles();
  let fileIdx = fileItems.findIndex(f => f.path === filePath);
  if (fileIdx === -1) fileIdx = fileItems.findIndex(f => f.name === filePath);
  // Also try matching just the basename (for summaries that use bare filenames)
  if (fileIdx === -1) {
    const baseName = parts[parts.length - 1];
    fileIdx = fileItems.findIndex(f => f.name === baseName);
  }
  if (fileIdx === -1) {
    showRefError('File not found: ' + filePath);
    return;
  }
  currentIndex = fileIdx;
  enterGallery(() => {
    const commentId = 'comment-' + encodeURIComponent(fileItems[fileIdx].path) + '-' + commentIndex;
    const commentEl = document.getElementById(commentId);
    if (commentEl) {
      commentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      commentEl.classList.add('highlight-flash');
      commentEl.addEventListener('animationend', () => {
        commentEl.classList.remove('highlight-flash');
      }, { once: true });
    } else {
      showRefError('Comment #' + commentIndex + ' not found on ' + filePath);
    }
  });
}

async function navigateToImage(filePath) {
  // If file is in a different directory, navigate there first
  const parts = filePath.split('/');
  const fileDir = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
  if (fileDir !== currentDir) {
    navigateToDir(fileDir);
    await new Promise(r => setTimeout(r, 300));
  }

  const fileItems = onlyFiles();
  let fileIdx = fileItems.findIndex(f => f.path === filePath);
  if (fileIdx === -1) fileIdx = fileItems.findIndex(f => f.name === filePath);
  if (fileIdx === -1) {
    const baseName = parts[parts.length - 1];
    fileIdx = fileItems.findIndex(f => f.name === baseName);
  }
  if (fileIdx === -1) {
    showRefError('File not found: ' + filePath);
    return;
  }
  currentIndex = fileIdx;
  enterGallery();
}

function showRefError(message) {
  const tooltip = document.createElement('div');
  tooltip.className = 'ref-error-tooltip';
  tooltip.textContent = message;
  tooltip.style.top = '50%';
  tooltip.style.left = '50%';
  tooltip.style.transform = 'translate(-50%, -50%)';
  document.body.appendChild(tooltip);
  setTimeout(() => tooltip.remove(), 2000);
}

// ── Zoom & Pan ──
let zoomScale = 1;
let zoomX = 0;
let zoomY = 0;
let zoomFitScale = 1;
let zoomNatW = 0;
let zoomNatH = 0;
let rotation = 0; // 0, 90, 180, 270

function getVisualDims() {
  const isR = rotation % 180 !== 0;
  return {
    visW: isR ? zoomNatH : zoomNatW,
    visH: isR ? zoomNatW : zoomNatH,
    rotOffX: isR ? (zoomNatW - zoomNatH) / 2 : 0,
    rotOffY: isR ? (zoomNatH - zoomNatW) / 2 : 0,
  };
}

// Region drawing state
let stagedRegion = null;
let drawingRegion = null;
let drawStartImgX = 0;
let drawStartImgY = 0;
let hoveredCommentRegion = null;

// Persistent annotation state
let showAnnotations = true;
let focusedCommentIndex = null;
let editingRegionIndex = null;
let editDragType = null;
let editStartMouse = null;
let editStartRegion = null;
let selectedRegionIndex = null;

function initZoom() {
  const img = document.getElementById('zoom-img');
  const container = document.getElementById('zoom-container');
  if (!img || !container) return;

  zoomScale = 1; zoomX = 0; zoomY = 0; rotation = 0;
  stagedRegion = null; drawingRegion = null; hoveredCommentRegion = null;

  img.addEventListener('load', () => {
    zoomNatW = img.naturalWidth;
    zoomNatH = img.naturalHeight;
    fitImage();
  });
  if (img.complete && img.naturalWidth) {
    zoomNatW = img.naturalWidth;
    zoomNatH = img.naturalHeight;
    fitImage();
  }

  container.addEventListener('wheel', onZoomWheel, { passive: false });
  container.addEventListener('mousedown', onPanStart);
  container.addEventListener('dblclick', onZoomDblClick);
}

function fitImage() {
  const container = document.getElementById('zoom-container');
  const img = document.getElementById('zoom-img');
  if (!container || !img || !zoomNatW) return;

  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const { visW, visH, rotOffX, rotOffY } = getVisualDims();
  zoomFitScale = Math.min(cw / visW, ch / visH);
  zoomScale = zoomFitScale;
  zoomX = (cw - visW * zoomScale) / 2 - rotOffX * zoomScale;
  zoomY = (ch - visH * zoomScale) / 2 - rotOffY * zoomScale;
  applyZoom();
  renderRegionOverlay();
}

function applyZoom() {
  const img = document.getElementById('zoom-img');
  if (!img) return;
  const cx = zoomNatW / 2;
  const cy = zoomNatH / 2;
  const t = `translate(${zoomX}px, ${zoomY}px) scale(${zoomScale}) translate(${cx}px, ${cy}px) rotate(${rotation}deg) translate(${-cx}px, ${-cy}px)`;
  img.style.transform = t;
  img.style.width = zoomNatW + 'px';
  img.style.height = zoomNatH + 'px';
  const svg = document.getElementById('region-overlay');
  if (svg) {
    svg.style.transform = t;
    svg.setAttribute('width', zoomNatW);
    svg.setAttribute('height', zoomNatH);
  }
}

function clampPan() {
  const container = document.getElementById('zoom-container');
  if (!container) return;
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const { visW, visH, rotOffX, rotOffY } = getVisualDims();
  const imgW = visW * zoomScale;
  const imgH = visH * zoomScale;

  // Work in terms of the effective visual position
  let effX = zoomX + rotOffX * zoomScale;
  let effY = zoomY + rotOffY * zoomScale;

  if (imgW <= cw) {
    effX = (cw - imgW) / 2;
  } else {
    effX = Math.min(0, Math.max(cw - imgW, effX));
  }
  if (imgH <= ch) {
    effY = (ch - imgH) / 2;
  } else {
    effY = Math.min(0, Math.max(ch - imgH, effY));
  }

  zoomX = effX - rotOffX * zoomScale;
  zoomY = effY - rotOffY * zoomScale;
}

function onZoomWheel(e) {
  e.preventDefault();
  const container = document.getElementById('zoom-container');
  if (!container || !zoomNatW) return;

  if (e.ctrlKey) {
    // Pinch-to-zoom (trackpad pinch fires wheel with ctrlKey)
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const oldScale = zoomScale;
    // Pinch deltaY is usually smaller, so use a gentler factor
    const factor = Math.exp(-e.deltaY * 0.01);
    let newScale = zoomScale * factor;

    const minScale = zoomFitScale * 0.95;
    const maxScale = Math.max(zoomFitScale * 8, 4);
    newScale = Math.max(minScale, Math.min(maxScale, newScale));

    zoomX = mx - (mx - zoomX) * (newScale / oldScale);
    zoomY = my - (my - zoomY) * (newScale / oldScale);
    zoomScale = newScale;
  } else {
    // Two-finger scroll → pan
    zoomX -= e.deltaX;
    zoomY -= e.deltaY;
  }

  clampPan();
  applyZoom();
}

function onZoomDblClick(e) {
  const container = document.getElementById('zoom-container');
  if (!container || !zoomNatW) return;

  const isZoomed = zoomScale > zoomFitScale * 1.02;
  if (isZoomed) {
    fitImage();
  } else {
    // Zoom to 1:1 centered on click point
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const oldScale = zoomScale;
    const newScale = Math.max(1, zoomFitScale * 3);
    zoomX = mx - (mx - zoomX) * (newScale / oldScale);
    zoomY = my - (my - zoomY) * (newScale / oldScale);
    zoomScale = newScale;
    clampPan();
    applyZoom();
  }
}

function onPanStart(e) {
  // Hold Cmd/Ctrl (or Alt) to draw through existing regions
  const forceDrawMode = e.metaKey || e.ctrlKey || e.altKey;

  // Check if click is on an SVG region element
  const target = e.target;
  if (!forceDrawMode && target.dataset && target.dataset.regionIdx !== undefined) {
    const idx = parseInt(target.dataset.regionIdx, 10);
    e.preventDefault();
    editingRegionIndex = idx;

    // Determine drag type from click position relative to region edges
    const comment = (onlyFiles()[currentIndex].comments || [])[idx];
    if (comment && comment.region) {
      const clickPt = viewportToImgPct(e.clientX, e.clientY);
      const r = comment.region;
      const edgePct = Math.max(1.5, Math.min(4, Math.min(r.w, r.h) * 0.2)); // % threshold for edges
      const nearL = clickPt.x - r.x < edgePct;
      const nearR = (r.x + r.w) - clickPt.x < edgePct;
      const nearT = clickPt.y - r.y < edgePct;
      const nearB = (r.y + r.h) - clickPt.y < edgePct;

      let dragType = 'move';
      if (nearT && nearL) dragType = 'nw';
      else if (nearT && nearR) dragType = 'ne';
      else if (nearB && nearL) dragType = 'sw';
      else if (nearB && nearR) dragType = 'se';
      else if (nearT) dragType = 'n';
      else if (nearB) dragType = 's';
      else if (nearL) dragType = 'w';
      else if (nearR) dragType = 'e';

      onEditStart(e, idx, dragType);
    } else {
      onEditStart(e, idx, 'move');
    }
    return;
  }

  // Click was outside all regions — deselect and draw
  if (editingRegionIndex !== null || selectedRegionIndex !== null) {
    editingRegionIndex = null;
    selectedRegionIndex = null;
    renderRegionOverlay();
  }
  onDrawStart(e);
}

function onEditStart(e, idx, type) {
  editDragType = type;
  editingRegionIndex = idx;
  const comments = onlyFiles()[currentIndex].comments || [];
  editStartRegion = { ...comments[idx].region };
  editStartMouse = viewportToImgPct(e.clientX, e.clientY);

  const onMove = (ev) => {
    const cur = viewportToImgPct(ev.clientX, ev.clientY);
    const dx = cur.x - editStartMouse.x;
    const dy = cur.y - editStartMouse.y;
    const r = editStartRegion;
    const comment = onlyFiles()[currentIndex].comments[idx];

    if (editDragType === 'move') {
      comment.region = {
        x: Math.max(0, Math.min(100 - r.w, r.x + dx)),
        y: Math.max(0, Math.min(100 - r.h, r.y + dy)),
        w: r.w,
        h: r.h,
      };
    } else {
      let nx = r.x, ny = r.y, nw = r.w, nh = r.h;
      // Left edge moves
      if (editDragType === 'nw' || editDragType === 'sw' || editDragType === 'w') {
        nx = Math.max(0, Math.min(r.x + r.w - 2, r.x + dx));
        nw = r.w - (nx - r.x);
      }
      // Right edge moves
      if (editDragType === 'ne' || editDragType === 'se' || editDragType === 'e') {
        nw = Math.max(2, r.w + dx);
      }
      // Top edge moves
      if (editDragType === 'nw' || editDragType === 'ne' || editDragType === 'n') {
        ny = Math.max(0, Math.min(r.y + r.h - 2, r.y + dy));
        nh = r.h - (ny - r.y);
      }
      // Bottom edge moves
      if (editDragType === 'sw' || editDragType === 'se' || editDragType === 's') {
        nh = Math.max(2, r.h + dy);
      }
      comment.region = { x: nx, y: ny, w: Math.min(100 - nx, nw), h: Math.min(100 - ny, nh) };
    }
    renderRegionOverlay();
  };

  let didDrag = false;
  const origOnMove = onMove;
  const trackingOnMove = (ev) => {
    const cur = viewportToImgPct(ev.clientX, ev.clientY);
    const dx = Math.abs(cur.x - editStartMouse.x);
    const dy = Math.abs(cur.y - editStartMouse.y);
    if (dx > 0.5 || dy > 0.5) didDrag = true;
    origOnMove(ev);
  };

  const onUp = async () => {
    document.removeEventListener('mousemove', trackingOnMove);
    document.removeEventListener('mouseup', onUp);
    editDragType = null;
    const savedStart = editStartMouse;
    editStartMouse = null;
    editStartRegion = null;

    if (!didDrag) {
      // Click without drag → select/deselect this region
      selectedRegionIndex = (selectedRegionIndex === idx) ? null : idx;
      renderRegionOverlay();
      return;
    }

    selectedRegionIndex = null;
    // Save to server
    const file = onlyFiles()[currentIndex];
    const comment = file.comments[idx];
    try {
      await api(`/api/files/${encodeURIComponent(file.path)}/comments/${idx}/region`, {
        method: 'PUT',
        body: { region: comment.region },
      });
    } catch (err) {
      console.error('Failed to save region edit:', err);
    }
  };

  document.addEventListener('mousemove', trackingOnMove);
  document.addEventListener('mouseup', onUp);
  renderRegionOverlay();
}

// ── Region Drawing ──
function viewportToImgPct(clientX, clientY) {
  const container = document.getElementById('zoom-container');
  const rect = container.getBoundingClientRect();
  const vpX = clientX - rect.left;
  const vpY = clientY - rect.top;
  // Undo translate and scale
  let rawX = (vpX - zoomX) / zoomScale;
  let rawY = (vpY - zoomY) / zoomScale;
  // Undo rotation around image center
  const cx = zoomNatW / 2;
  const cy = zoomNatH / 2;
  let rx = rawX - cx;
  let ry = rawY - cy;
  if (rotation === 90)  { [rx, ry] = [ry, -rx]; }
  else if (rotation === 180) { [rx, ry] = [-rx, -ry]; }
  else if (rotation === 270) { [rx, ry] = [-ry, rx]; }
  const imgX = rx + cx;
  const imgY = ry + cy;
  return {
    x: Math.max(0, Math.min(100, (imgX / zoomNatW) * 100)),
    y: Math.max(0, Math.min(100, (imgY / zoomNatH) * 100)),
  };
}

function onDrawStart(e) {
  e.preventDefault();
  const altHeldOnStart = e.altKey;
  const start = viewportToImgPct(e.clientX, e.clientY);
  drawStartImgX = start.x;
  drawStartImgY = start.y;
  drawingRegion = { x: start.x, y: start.y, w: 0, h: 0 };

  const onMove = (ev) => {
    const cur = viewportToImgPct(ev.clientX, ev.clientY);
    drawingRegion = {
      x: Math.min(drawStartImgX, cur.x),
      y: Math.min(drawStartImgY, cur.y),
      w: Math.abs(cur.x - drawStartImgX),
      h: Math.abs(cur.y - drawStartImgY),
    };
    renderRegionOverlay();
  };

  const onUp = (ev) => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const altHeld = altHeldOnStart || ev.altKey;

    // Only stage if region is big enough (>0.5% in both dims — roughly a click vs a drag)
    if (drawingRegion && drawingRegion.w > 0.5 && drawingRegion.h > 0.5) {
      stagedRegion = { ...drawingRegion };
      drawingRegion = null;
      renderRegionOverlay();
      updateStagedRegionUI();
      if (altHeld) {
        // Alt held → immediately ask Claude to describe this region
        describeRegionWithClaude();
      } else {
        document.getElementById('comment-input').focus();
      }
    } else {
      drawingRegion = null;
      renderRegionOverlay();
    }
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function renderRegionOverlay() {
  const svg = document.getElementById('region-overlay');
  if (!svg || !zoomNatW) return;

  let rects = '';
  const handleSize = Math.max(8, Math.round(zoomNatW / 200));

  // 1. Drawing region (active drag)
  if (drawingRegion) {
    const r = drawingRegion;
    const x = (r.x / 100) * zoomNatW;
    const y = (r.y / 100) * zoomNatH;
    const w = (r.w / 100) * zoomNatW;
    const h = (r.h / 100) * zoomNatH;
    rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="region-rect-drawing"/>`;
  }

  // 2. Staged region (ready to attach to comment)
  if (stagedRegion) {
    const r = stagedRegion;
    const x = (r.x / 100) * zoomNatW;
    const y = (r.y / 100) * zoomNatH;
    const w = (r.w / 100) * zoomNatW;
    const h = (r.h / 100) * zoomNatH;
    rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="region-rect-staged"/>`;
  }

  // 3. Persistent comment regions
  if (showAnnotations && onlyFiles()[currentIndex]) {
    const comments = onlyFiles()[currentIndex].comments || [];
    comments.forEach((c, i) => {
      if (!c.region) return;
      const r = c.region;
      const x = (r.x / 100) * zoomNatW;
      const y = (r.y / 100) * zoomNatH;
      const w = (r.w / 100) * zoomNatW;
      const h = (r.h / 100) * zoomNatH;

      // Determine class based on focus/selection state
      let cls = 'region-rect-persistent';
      const isSelected = selectedRegionIndex === i;
      if (isSelected) cls = 'region-rect-selected';
      else if (focusedCommentIndex === i) cls = 'region-rect-focused';
      else if (focusedCommentIndex !== null) cls = 'region-rect-dimmed';

      // Body rect — pointer-events for hover + drag-to-move/resize
      rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" class="${cls}" data-region-idx="${i}" style="pointer-events:all;cursor:move"/>`;

      // Label
      const fontSize = Math.max(12, Math.round(zoomNatW / 150));
      const labelText = isSelected ? `#${i + 1} ⌫` : `#${i + 1}`;
      const labelW = fontSize * labelText.length * 0.65 + 8;
      const labelH = fontSize + 6;
      const labelFill = isSelected ? '#ff4444' : '#00ff66';
      const labelOpacity = cls === 'region-rect-dimmed' ? 0.15 : (cls === 'region-rect-focused' || isSelected ? 1 : 0.7);
      rects += `<rect x="${x}" y="${y - labelH}" width="${labelW}" height="${labelH}" fill="${labelFill}" rx="2" style="pointer-events:none;opacity:${labelOpacity}"/>`;
      rects += `<text x="${x + 4}" y="${y - 4}" fill="${isSelected ? 'white' : 'black'}" font-size="${fontSize}" font-weight="bold" font-family="-apple-system,sans-serif" style="pointer-events:none;opacity:${labelOpacity}">${labelText}</text>`;
    });
  }

  svg.innerHTML = rects;

  // Attach hover listeners on persistent rects for focus/dim + dynamic cursor
  if (showAnnotations) {
    svg.querySelectorAll('[data-region-idx]').forEach(el => {
      el.addEventListener('mouseenter', () => {
        if (editDragType) return; // don't change focus while dragging/resizing
        const idx = parseInt(el.dataset.regionIdx, 10);
        if (focusedCommentIndex !== idx) {
          focusedCommentIndex = idx;
          highlightSidebarComment(idx);
          renderRegionOverlay();
        }
      });
      el.addEventListener('mouseleave', () => {
        if (editDragType) return; // don't change focus while dragging/resizing
        if (focusedCommentIndex !== null) {
          focusedCommentIndex = null;
          highlightSidebarComment(null);
          renderRegionOverlay();
        }
      });
      // Dynamic cursor based on position within rect
      el.addEventListener('mousemove', (ev) => {
        const idx = parseInt(el.dataset.regionIdx, 10);
        const comment = (onlyFiles()[currentIndex].comments || [])[idx];
        if (!comment || !comment.region) return;
        const pt = viewportToImgPct(ev.clientX, ev.clientY);
        const r = comment.region;
        const edgePct = Math.max(1.5, Math.min(4, Math.min(r.w, r.h) * 0.2));
        const nearL = pt.x - r.x < edgePct;
        const nearR = (r.x + r.w) - pt.x < edgePct;
        const nearT = pt.y - r.y < edgePct;
        const nearB = (r.y + r.h) - pt.y < edgePct;
        let cursor = 'move';
        if ((nearT && nearL) || (nearB && nearR)) cursor = 'nwse-resize';
        else if ((nearT && nearR) || (nearB && nearL)) cursor = 'nesw-resize';
        else if (nearT || nearB) cursor = 'ns-resize';
        else if (nearL || nearR) cursor = 'ew-resize';
        el.style.cursor = cursor;
      });
      // Right-click "Send to Chat" on region rects
      el.addEventListener('contextmenu', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const idx = parseInt(el.dataset.regionIdx, 10);
        const file = onlyFiles()[currentIndex];
        if (!file) return;
        const comment = (file.comments || [])[idx];
        if (!comment || !comment.region) return;
        showContextMenu(ev.clientX, ev.clientY, [
          { label: 'Send crop to Chat', icon: 'sparkle', action: () => {
            addProjectAttachment(file.path, comment.region, `#${idx+1} crop`);
            if (!chatOpen) toggleChat();
          }},
          { label: 'Send full image to Chat', icon: 'image', action: () => {
            addProjectAttachment(file.path, null, file.name);
            if (!chatOpen) toggleChat();
          }},
        ]);
      });
    });
  }
}

// Highlight a comment in the sidebar by index

      el.querySelector('.region-clear-x').addEventListener('click', clearStagedRegion);

// Queue for describe-region requests to avoid read-modify-write races on .context.json
const describeQueue = [];
let describeProcessing = false;
let describePendingCount = 0;

function updateDescribeStatus() {
  const bar = document.getElementById('describe-queue-bar');
  if (describePendingCount > 0) {
    if (!bar) {
      const el = document.createElement('div');
      el.id = 'describe-queue-bar';
      el.className = 'region-clear';
      el.style.background = 'rgba(234,179,8,0.12)';
      el.style.borderColor = 'var(--gold)';
      el.style.color = 'var(--gold)';
      const inputArea = document.querySelector('.sidebar-input');
      inputArea.insertBefore(el, inputArea.firstChild);
    }
    const el = document.getElementById('describe-queue-bar');
    el.textContent = describePendingCount === 1
      ? 'Claude is thinking...'
      : `Claude is thinking... (${describePendingCount} regions queued)`;
  } else if (bar) {
    bar.remove();
  }
}

async function processDescribeQueue() {
  if (describeProcessing) return;
  describeProcessing = true;

  while (describeQueue.length > 0) {
    const { filePath, region } = describeQueue.shift();
    try {
      const res = await api(`/api/files/${encodeURIComponent(filePath)}/describe-region`, {
        method: 'POST',
        body: { region },
      });
      if (res.error) {
        console.error('Describe region error:', res.error);
        alert('Claude annotation failed: ' + res.error);
      }
    } catch (e) {
      console.error('Describe region failed:', e.message);
      alert('Claude annotation failed: ' + e.message);
    }
    describePendingCount--;
    updateDescribeStatus();
    // Refresh after each one so the user sees results appearing
    await reloadCurrentDir();
    refreshSidebar();
  }

  describeProcessing = false;
}

function describeRegionWithClaude() {
  if (!stagedRegion) return;
  if (!hasApiKey) {
    document.getElementById('btn-settings').click();
    return;
  }
  const file = onlyFiles()[currentIndex];
  if (!file) return;

  // Capture region and clear immediately so user can draw the next one
  const region = { ...stagedRegion };
  stagedRegion = null;
  updateStagedRegionUI();
  renderRegionOverlay();

  // Enqueue
  describeQueue.push({ filePath: file.path, region });
  describePendingCount++;
  updateDescribeStatus();
  processDescribeQueue();
}

function clearStagedRegion() {
  stagedRegion = null;
  renderRegionOverlay();
  updateStagedRegionUI();
}

function rotateCanvas(dir) {
  rotation = (rotation + dir + 360) % 360;

// ── Export ──
async function exportAnnotations(scope, path) {
  const btn = document.getElementById('btn-export');
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Exporting...';
  try {
    const res = await fetch('/api/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scope, path }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Export failed');
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const disposition = res.headers.get('Content-Disposition') || '';
    a.download = disposition.match(/filename="(.+)"/)?.[1] || 'export.zip';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Export failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
    document.getElementById('export-dropdown').style.display = 'none';
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Don't intercept when typing in input or using modifier keys (Cmd+R, Ctrl+R, etc.)
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.metaKey || e.ctrlKey) {
    return;
  }

  if (!galleryMode) {
    if (e.key === 'Enter') { startAddContext(); e.preventDefault(); }
    if (e.key === 'm' || e.key === 'M') { toggleSummary(); e.preventDefault(); }
    return;
  }

  switch (e.key) {
    case 'ArrowLeft': goPrev(); e.preventDefault(); break;
    case 'ArrowRight': goNext(); e.preventDefault(); break;
    case '/': document.getElementById('comment-input').focus(); e.preventDefault(); break;
    case 'r': case 'R': toggleRecording(); e.preventDefault(); break;
    case 's': case 'S': skipFile(); e.preventDefault(); break;
    case 'Delete':
    case 'Backspace':
      if (selectedRegionIndex !== null) {
        const file = onlyFiles()[currentIndex];
        if (file) {
          const idx = selectedRegionIndex;
          selectedRegionIndex = null;
          deleteComment(file.path, idx);
        }
        e.preventDefault();
      }
      break;
    case 'Escape':
      if (selectedRegionIndex !== null) {
        selectedRegionIndex = null;
        renderRegionOverlay();
      } else if (editingRegionIndex !== null) {
        editingRegionIndex = null;
        renderRegionOverlay();
      } else {
        exitGallery();
      }
      e.preventDefault();
      break;
    case '[': rotateCanvas(-90); e.preventDefault(); break;
    case ']': rotateCanvas(90); e.preventDefault(); break;
  }
});

// ── Punctuation Heuristics ──
function punctuate(raw) {
  if (!raw) return raw;
  let text = raw.trim();
  if (!text) return text;

  // Capitalize first letter
  text = text.charAt(0).toUpperCase() + text.slice(1);

  // Common spoken sentence-enders: add period before conjunctions that start new thoughts
  // "and then" / "so then" / "but then" in the middle often indicate new sentences
  const sentenceBreakers = /\b(so basically|and so|but anyway|okay so|and then I|but I think|so I think|also I|and I think)\b/gi;
  text = text.replace(sentenceBreakers, (match) => {
    return '. ' + match.charAt(0).toUpperCase() + match.slice(1);
  });

  // Capitalize after existing periods, question marks, exclamation marks
  text = text.replace(/([.!?])\s+([a-z])/g, (_, p, c) => p + ' ' + c.toUpperCase());

  // If text doesn't end with punctuation, add a period
  if (!/[.!?]$/.test(text)) {
    text += '.';
  }

  // Capitalize "I" standing alone
  text = text.replace(/\bi\b/g, 'I');

  // Capitalize common proper nouns that speech recognition lowercases
  const properNouns = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday',
    'january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december'];
  for (const noun of properNouns) {
    const regex = new RegExp('\\b' + noun + '\\b', 'gi');
    text = text.replace(regex, noun.charAt(0).toUpperCase() + noun.slice(1));
  }

  // Clean up double spaces and double periods
  text = text.replace(/\s{2,}/g, ' ');
  text = text.replace(/\.{2,}/g, '.');
  text = text.replace(/\.\s*\./g, '.');

  return text;
}

// ── Voice Input ──
let recognition = null;
let isRecording = false;
let textBeforeRecording = '';
let mediaRecorder = null;
let audioChunks = [];
let lastAudioFilename = null;

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('btn-mic').style.display = 'none';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    // Rebuild full transcript from all results every time
    let final = '';
    let interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    const input = document.getElementById('comment-input');
    const sep = textBeforeRecording ? textBeforeRecording + ' ' : '';
    const cleaned = punctuate(final);
    input.value = sep + cleaned + (interim ? ' ' + interim : '');
    input.scrollTop = input.scrollHeight;

    document.getElementById('voice-status').textContent = interim ? 'Listening...' : 'Processing...';
  };

  recognition.onend = () => {
    if (isRecording) {
      // Auto-restart if still in recording mode (browser stops after silence)
      recognition.start();
      return;
    }
    textBeforeRecording = '';
    document.getElementById('voice-status').textContent = '';
    document.getElementById('voice-status').classList.remove('recording');
    document.getElementById('btn-mic').classList.remove('recording');
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return; // Ignore, will auto-restart
    console.error('Speech error:', e.error);
    stopRecording();
    document.getElementById('voice-status').textContent = 'Error: ' + e.error;
  };
}

async function startRecording() {
  if (!recognition) return;
  isRecording = true;
  lastAudioFilename = null;
  audioChunks = [];
  textBeforeRecording = document.getElementById('comment-input').value.trim();
  recognition.start();

  // Start audio capture in parallel
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      if (audioChunks.length === 0) return;
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const file = onlyFiles()[currentIndex];
      if (!file) return;
      // Upload audio
      const res = await fetch(`/api/files/${encodeURIComponent(file.path)}/audio`, {
        method: 'POST',
        body: blob,
      });
      const data = await res.json();
      lastAudioFilename = data.audioFilename;
    };
    mediaRecorder.start();
  } catch (e) {
    console.warn('Audio capture unavailable:', e);
  }

  document.getElementById('btn-mic').classList.add('recording');
  document.getElementById('voice-status').textContent = 'Listening...';
  document.getElementById('voice-status').classList.add('recording');
}

function stopRecording() {
  if (!recognition) return;
  isRecording = false;
  recognition.stop();

  // Stop audio capture
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }

  // Auto-submit after a short delay to let final results + audio upload land
  setTimeout(() => addComment(), 500);
}

function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

document.getElementById('btn-mic').addEventListener('click', toggleRecording);
initVoice();

// ── Copy Helpers ──
async function copyImageToClipboard(blob, btn, label) {
  const originalHtml = btn.innerHTML;
  try {
    await navigator.clipboard.write([
      new ClipboardItem({ 'image/png': blob }),
    ]);
    btn.style.opacity = '0.5';
  } catch (e) {
    console.error('Copy failed:', e);
    btn.style.opacity = '0.5';
  }
  setTimeout(() => { btn.innerHTML = originalHtml; btn.style.opacity = ''; btn.disabled = false; }, 1500);
}

// Word-wrap text onto canvas, returns array of lines
function wrapText(ctx, text, maxWidth) {
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// ── Copy+ (annotated image with comment legend) ──
document.getElementById('btn-copy-context').addEventListener('click', async () => {
  const file = onlyFiles()[currentIndex];
  if (!file) return;
  const btn = document.getElementById('btn-copy-context');
  const originalHtml = btn.innerHTML;
  btn.style.opacity = '0.5';
  btn.disabled = true;

  try {
    const img = document.getElementById('zoom-img');
    if (!img || !img.naturalWidth) throw new Error('Image not ready');

    const natW = img.naturalWidth;
    const natH = img.naturalHeight;
    const comments = file.comments || [];

    // --- Right rail layout (image left, annotations right) ---
    const railWidth = Math.round(natW * 0.38);
    const railPad = Math.round(railWidth * 0.06);
    const fontSize = Math.max(13, Math.round(railWidth / 22));
    const lineHeight = Math.round(fontSize * 1.55);
    const maxTextW = railWidth - railPad * 2;
    const titleFontSize = Math.round(fontSize * 1.15);
    const numFontSize = Math.round(fontSize * 0.85);

    // Pre-compute wrapped lines
    const measureCanvas = document.createElement('canvas');
    const measureCtx = measureCanvas.getContext('2d');
    measureCtx.font = `${fontSize}px -apple-system, system-ui, sans-serif`;

    const commentBlocks = comments.map((c, i) => {
      const lines = wrapText(measureCtx, c.text, maxTextW - railPad);
      return { index: i, comment: c, lines };
    });

    // Calculate rail height — at minimum match image height
    const commentGap = Math.round(lineHeight * 0.8);
    const headerH = Math.round(titleFontSize * 3);
    const contentH = commentBlocks.reduce((sum, b) => sum + (numFontSize + 4) + b.lines.length * lineHeight + commentGap, 0);
    const railH = Math.max(natH, headerH + contentH + railPad * 2);

    // --- Draw everything ---
    const canvas = document.createElement('canvas');
    const totalW = comments.length > 0 ? natW + railWidth : natW;
    const totalH = comments.length > 0 ? Math.max(natH, railH) : natH;
    canvas.width = totalW;
    canvas.height = totalH;
    const ctx = canvas.getContext('2d');

    // Dark background behind everything
    ctx.fillStyle = '#141414';
    ctx.fillRect(0, 0, totalW, totalH);

    // Draw image on left
    ctx.drawImage(img, 0, 0, natW, natH);

    // Draw region rectangles on image
    ctx.strokeStyle = '#00ff66';
    ctx.lineWidth = Math.max(4, Math.round(natW / 350));
    comments.filter(c => c.region).forEach(c => {
      const r = c.region;
      const x = (r.x / 100) * natW;
      const y = (r.y / 100) * natH;
      const w = (r.w / 100) * natW;
      const h = (r.h / 100) * natH;
      ctx.strokeRect(x, y, w, h);
      const label = `#${comments.indexOf(c) + 1}`;
      const labelFontSize = Math.max(14, Math.round(natW / 130));
      ctx.font = `bold ${labelFontSize}px -apple-system, sans-serif`;
      const metrics = ctx.measureText(label);
      const pad = 4;
      ctx.fillStyle = '#00ff66';
      ctx.fillRect(x, y - labelFontSize - pad * 2, metrics.width + pad * 2, labelFontSize + pad * 2);
      ctx.fillStyle = 'black';
      ctx.fillText(label, x + pad, y - pad);
    });

    // Draw right rail
    if (comments.length > 0) {
      const rx = natW;

      // Rail background
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(rx, 0, railWidth, totalH);

      // Subtle left border
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(rx, 0);
      ctx.lineTo(rx, totalH);
      ctx.stroke();

      // Title
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = `600 ${titleFontSize}px -apple-system, system-ui, sans-serif`;
      ctx.fillText(file.name, rx + railPad, railPad + titleFontSize);

      // Subtitle
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = `${numFontSize}px -apple-system, system-ui, sans-serif`;
      ctx.fillText(`${comments.length} annotation${comments.length !== 1 ? 's' : ''}`, rx + railPad, railPad + titleFontSize + numFontSize + 6);

      // Separator
      const sepY = headerH - 4;
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.moveTo(rx + railPad, sepY);
      ctx.lineTo(rx + railWidth - railPad, sepY);
      ctx.stroke();

      // Comments
      let curY = headerH + railPad;

      commentBlocks.forEach((block) => {
        // Number badge
        const badge = `#${block.index + 1}`;
        const authorLabel = block.comment.author === 'claude' ? 'CLAUDE' : 'USER';
        ctx.font = `bold ${numFontSize}px -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = block.comment.author === 'claude' ? '#eab308' : '#3b82f6';
        ctx.fillText(`${authorLabel}  ${badge}`, rx + railPad, curY + numFontSize);
        curY += numFontSize + 6;

        // Comment text
        ctx.font = `${fontSize}px -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        block.lines.forEach((line) => {
          ctx.fillText(line, rx + railPad, curY + fontSize);
          curY += lineHeight;
        });

        curY += commentGap;
      });
    }

    // Export and copy
    const blob = await new Promise((res, rej) =>
      canvas.toBlob(b => b ? res(b) : rej(new Error('toBlob failed')), 'image/png'));
    await copyImageToClipboard(blob, btn, 'Copy+');
  } catch (e) {
    console.error('Copy+ failed:', e);
    btn.style.opacity = '0.5';
    setTimeout(() => { btn.innerHTML = originalHtml; btn.style.opacity = ''; btn.disabled = false; }, 1500);
  }
});

let summaryRawContent = '';
let summaryLastModified = null;

// ── Marked.js custom renderer for summary references ──
function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

if (typeof marked !== 'undefined') {
  marked.use({
    renderer: {
      link({ href, title, tokens }) {
        const text = this.parser.parseInline(tokens);

        // Handle comment:FILENAME:INDEX links
        const commentMatch = href && href.match(/^comment:(.+):(\d+)$/);
        if (commentMatch) {
          const filename = decodeURIComponent(commentMatch[1]);
          const commentIndex = commentMatch[2];
          return `<a class="ref-comment" data-ref-type="comment" data-file="${escapeAttr(filename)}" data-comment-index="${commentIndex}" title="Go to comment #${commentIndex} on ${escapeAttr(filename)}">${text}</a>`;
        }

        // Handle image:FILENAME links
        const imageMatch = href && href.match(/^image:(.+)$/);
        if (imageMatch) {
          const filename = decodeURIComponent(imageMatch[1]);
          return `<a class="ref-image" data-ref-type="image" data-file="${escapeAttr(filename)}" title="View ${escapeAttr(filename)}">${text}</a>`;
        }

        // Default link rendering
        const titleAttr = title ? ` title="${escapeAttr(title)}"` : '';
        return `<a href="${href}"${titleAttr} target="_blank" rel="noopener">${text}</a>`;
      }
    }
  });
}

async function loadSummary() {
  const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
  const data = await api(`/api/summary${dirParam}`);
  if (data.content !== null && data.lastModified !== summaryLastModified) {
    summaryRawContent = data.content;
    summaryLastModified = data.lastModified;
    if (!summaryEditMode) renderSummary();
  } else if (data.content === null) {
    summaryRawContent = '';
    summaryLastModified = null;
    if (!summaryEditMode) renderSummary();
  }
}

function fixCitationLinks(md) {
  // Encode spaces inside (comment:...) and (image:...) links so marked can parse them
  return md.replace(/\]\((comment|image):([^)]+)\)/g, (match, type, path) => {
    const encoded = path.replace(/ /g, '%20');
    return `](${type}:${encoded})`;
  });
}

function renderSummary() {
  const el = document.getElementById('summary-content');
  if (!summaryRawContent) {
    el.innerHTML = '<div class="summary-empty">No summary yet. Click "Generate" to create one.</div>';
    return;
  }
  if (summaryEditMode) {
    el.innerHTML = `<textarea class="summary-editor" id="summary-editor">${escapeHtml(summaryRawContent)}</textarea>`;
  } else {
    const fixed = fixCitationLinks(summaryRawContent);
    const html = (typeof marked !== 'undefined') ? marked.parse(fixed) : `<pre>${escapeHtml(summaryRawContent)}</pre>`;
    el.innerHTML = `<div class="summary-rendered">${html}</div>`;
  }
}

function toggleSummary() {

  const rail = document.getElementById('summary-siderail');

    rail.classList.remove('active');
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-ghost');
  }
}

function toggleSummaryEdit() {
  const editBtn = document.getElementById('btn-summary-edit');
  if (summaryEditMode) {
    const editor = document.getElementById('summary-editor');
    if (editor) {
      summaryRawContent = editor.value;
      const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
      api(`/api/summary${dirParam}`, { method: 'POST', body: { content: summaryRawContent } });

    summaryEditMode = false;
    editBtn.textContent = 'Edit';

    summaryEditMode = true;
    editBtn.textContent = 'Done';
    renderSummary();
    const editor = document.getElementById('summary-editor');
    if (editor) editor.focus();
  }
}

    btn.textContent = 'Copied';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

        <div class="summary-loading-step" id="loading-step">${steps[0]}</div>
      </div>
      <div class="summary-loading-shimmer">
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
      </div>
    </div>`;

  const stepInterval = setInterval(() => {
    stepIdx = Math.min(stepIdx + 1, steps.length - 1);
    const stepEl = document.getElementById('loading-step');
    if (stepEl) stepEl.textContent = steps[stepIdx];
  }, 3000);

  try {
    let url = '/api/summary/generate';
    const params = [];
    if (currentDir) params.push(`dir=${encodeURIComponent(currentDir)}`);
    if (aggregate) params.push('aggregate=true');
    if (params.length) url += '?' + params.join('&');
    const res = await api(url, { method: 'POST', body: {} });
    if (res.error) {
      alert('Error: ' + res.error);
      renderSummary(); // restore previous state
    } else if (res.content) {
      summaryRawContent = res.content;
      summaryCurrentVersion = res.version;
      summaryTotalVersions = res.totalVersions;
      summaryLastModified = new Date().toISOString();
      renderSummary();
      updateVersionNav();
    }
  } catch (e) {
    alert('Failed to generate summary: ' + e.message);
    renderSummary();
  } finally {
    clearInterval(stepInterval);
    btn.disabled = false;
    btn.textContent = aggregate ? 'Generate All' : 'Generate';
    if (otherBtn) otherBtn.disabled = false;
  }
}

function updateVersionNav() {
  const nav = document.getElementById('version-nav');
  const label = document.getElementById('version-label');
  const prevBtn = document.getElementById('btn-version-prev');
  const nextBtn = document.getElementById('btn-version-next');
  if (summaryTotalVersions > 0) {
    nav.style.display = '';
    label.textContent = `v${summaryCurrentVersion} of ${summaryTotalVersions}`;
    prevBtn.disabled = summaryCurrentVersion <= 1;
    nextBtn.disabled = summaryCurrentVersion >= summaryTotalVersions;
  } else {
    nav.style.display = 'none';
  }
}

async function loadVersionList() {
