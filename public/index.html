});

// ── Copy+ (annotated image with comment legend) ──
document.getElementById('btn-copy-context').addEventListener('click', async () => {
  const file = onlyFiles()[currentIndex];
  if (!file) return;
  const btn = document.getElementById('btn-copy-context');
  const originalHtml = btn.innerHTML;
  btn.style.opacity = '0.5';
  btn.disabled = true;

  try {
    const img = document.getElementById('zoom-img');
    if (!img || !img.naturalWidth) throw new Error('Image not ready');

    const natW = img.naturalWidth;
    const natH = img.naturalHeight;
    const comments = file.comments || [];

    // --- Right rail layout (image left, annotations right) ---
    const railWidth = Math.round(natW * 0.38);
    const railPad = Math.round(railWidth * 0.06);
    const fontSize = Math.max(13, Math.round(railWidth / 22));
    const lineHeight = Math.round(fontSize * 1.55);
    const maxTextW = railWidth - railPad * 2;
    const titleFontSize = Math.round(fontSize * 1.15);
    const numFontSize = Math.round(fontSize * 0.85);

    // Pre-compute wrapped lines
    const measureCanvas = document.createElement('canvas');
    const measureCtx = measureCanvas.getContext('2d');
    measureCtx.font = `${fontSize}px -apple-system, system-ui, sans-serif`;

    const commentBlocks = comments.map((c, i) => {
      const lines = wrapText(measureCtx, c.text, maxTextW - railPad);
      return { index: i, comment: c, lines };
    });

    // Calculate rail height — at minimum match image height
    const commentGap = Math.round(lineHeight * 0.8);
    const headerH = Math.round(titleFontSize * 3);
    const contentH = commentBlocks.reduce((sum, b) => sum + (numFontSize + 4) + b.lines.length * lineHeight + commentGap, 0);
    const railH = Math.max(natH, headerH + contentH + railPad * 2);

    // --- Draw everything ---
    const canvas = document.createElement('canvas');
    const totalW = comments.length > 0 ? natW + railWidth : natW;
    const totalH = comments.length > 0 ? Math.max(natH, railH) : natH;
    canvas.width = totalW;
    canvas.height = totalH;
    const ctx = canvas.getContext('2d');

    // Background behind everything (theme-aware)
    const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    ctx.fillStyle = isDarkMode ? '#141414' : '#f5f4f0';
    ctx.fillRect(0, 0, totalW, totalH);

    // Draw image on left
    ctx.drawImage(img, 0, 0, natW, natH);

    // Draw region rectangles on image
    ctx.strokeStyle = cssVar('--region-stroke');
    ctx.lineWidth = Math.max(4, Math.round(natW / 350));
    comments.filter(c => c.region).forEach(c => {
      const r = c.region;
      const x = (r.x / 100) * natW;
      const y = (r.y / 100) * natH;
      const w = (r.w / 100) * natW;
      const h = (r.h / 100) * natH;
      ctx.strokeRect(x, y, w, h);
      const label = `#${comments.indexOf(c) + 1}`;
      const labelFontSize = Math.max(14, Math.round(natW / 130));
      ctx.font = `bold ${labelFontSize}px 'Instrument Sans', -apple-system, sans-serif`;
      const metrics = ctx.measureText(label);
      const pad = 4;
      ctx.fillStyle = cssVar('--region-label-bg');
      ctx.fillRect(x, y - labelFontSize - pad * 2, metrics.width + pad * 2, labelFontSize + pad * 2);
      ctx.fillStyle = cssVar('--region-label-text');
      ctx.fillText(label, x + pad, y - pad);
    });

    // Draw right rail
    if (comments.length > 0) {
      const rx = natW;

      // Rail background
      ctx.fillStyle = isDarkMode ? '#1a1a1a' : '#ffffff';
      ctx.fillRect(rx, 0, railWidth, totalH);

      // Subtle left border
      ctx.strokeStyle = isDarkMode ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(rx, 0);
      ctx.lineTo(rx, totalH);
      ctx.stroke();

      // Title
      ctx.fillStyle = isDarkMode ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.5)';
      ctx.font = `600 ${titleFontSize}px 'Instrument Sans', -apple-system, system-ui, sans-serif`;
      ctx.fillText(file.name, rx + railPad, railPad + titleFontSize);

      // Subtitle
      ctx.fillStyle = isDarkMode ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
      ctx.font = `${numFontSize}px 'Instrument Sans', -apple-system, system-ui, sans-serif`;
      ctx.fillText(`${comments.length} annotation${comments.length !== 1 ? 's' : ''}`, rx + railPad, railPad + titleFontSize + numFontSize + 6);

      // Separator
      const sepY = headerH - 4;
      ctx.strokeStyle = isDarkMode ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
      ctx.beginPath();
      ctx.moveTo(rx + railPad, sepY);
      ctx.lineTo(rx + railWidth - railPad, sepY);
      ctx.stroke();

      // Comments
      let curY = headerH + railPad;

      commentBlocks.forEach((block) => {
        // Number badge
        const badge = `#${block.index + 1}`;
        const authorLabel = block.comment.author === 'claude' ? 'CLAUDE' : 'USER';
        ctx.font = `bold ${numFontSize}px 'Instrument Sans', -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = block.comment.author === 'claude' ? cssVar('--comment-claude-color') : cssVar('--comment-user-color');
        ctx.fillText(`${authorLabel}  ${badge}`, rx + railPad, curY + numFontSize);
        curY += numFontSize + 6;

        // Comment text
        ctx.font = `${fontSize}px 'Instrument Sans', -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = isDarkMode ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.85)';
        block.lines.forEach((line) => {
          ctx.fillText(line, rx + railPad, curY + fontSize);
          curY += lineHeight;
        });

        curY += commentGap;
      });
    }

    // Export and copy
    const blob = await new Promise((res, rej) =>
      canvas.toBlob(b => b ? res(b) : rej(new Error('toBlob failed')), 'image/png'));
    await copyImageToClipboard(blob, btn, 'Copy+');
  } catch (e) {
    console.error('Copy+ failed:', e);
    btn.style.opacity = '0.5';
    setTimeout(() => { btn.innerHTML = originalHtml; btn.style.opacity = ''; btn.disabled = false; }, 1500);
  }
});

// ── Summary Siderail ──
let summaryRawContent = '';
let summaryLastModified = null;
let summaryEditMode = false;
let summaryVisible = false;
let summaryCurrentVersion = null;
let summaryTotalVersions = 0;

// ── Marked.js custom renderer for summary references ──
function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

if (typeof marked !== 'undefined') {
  marked.use({
    renderer: {
      link({ href, title, tokens }) {
        const text = this.parser.parseInline(tokens);

        // Handle comment:FILENAME:INDEX links
        const commentMatch = href && href.match(/^comment:(.+):(\d+)$/);
        if (commentMatch) {
          const filename = decodeURIComponent(commentMatch[1]);
          const commentIndex = commentMatch[2];
          return `<a class="ref-comment" data-ref-type="comment" data-file="${escapeAttr(filename)}" data-comment-index="${commentIndex}" title="Go to comment #${commentIndex} on ${escapeAttr(filename)}">${text}</a>`;
        }

        // Handle image:FILENAME links
        const imageMatch = href && href.match(/^image:(.+)$/);
        if (imageMatch) {
          const filename = decodeURIComponent(imageMatch[1]);
          return `<a class="ref-image" data-ref-type="image" data-file="${escapeAttr(filename)}" title="View ${escapeAttr(filename)}">${text}</a>`;
        }

        // Default link rendering
        const titleAttr = title ? ` title="${escapeAttr(title)}"` : '';
        return `<a href="${href}"${titleAttr} target="_blank" rel="noopener">${text}</a>`;
      }
    }
  });
}

async function loadSummary() {
  const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
  const data = await api(`/api/summary${dirParam}`);
  if (data.content !== null && data.lastModified !== summaryLastModified) {
    summaryRawContent = data.content;
    summaryLastModified = data.lastModified;
    if (!summaryEditMode) renderSummary();
  } else if (data.content === null) {
    summaryRawContent = '';
    summaryLastModified = null;
    if (!summaryEditMode) renderSummary();
  }
}

function fixCitationLinks(md) {
  // Encode spaces inside (comment:...) and (image:...) links so marked can parse them
  return md.replace(/\]\((comment|image):([^)]+)\)/g, (match, type, path) => {
    const encoded = path.replace(/ /g, '%20');
    return `](${type}:${encoded})`;
  });
}

function renderSummary() {
  const el = document.getElementById('summary-content');
  if (!summaryRawContent) {
    el.innerHTML = '<div class="summary-empty">No summary yet. Click "Generate" to create one.</div>';
    return;
  }
  if (summaryEditMode) {
    el.innerHTML = `<textarea class="summary-editor" id="summary-editor">${escapeHtml(summaryRawContent)}</textarea>`;
  } else {
    const fixed = fixCitationLinks(summaryRawContent);
    const html = (typeof marked !== 'undefined') ? marked.parse(fixed) : `<pre>${escapeHtml(summaryRawContent)}</pre>`;
    el.innerHTML = `<div class="summary-rendered">${html}</div>`;
  }
}

function toggleSummary() {
  summaryVisible = !summaryVisible;
  const rail = document.getElementById('summary-siderail');
  const btn = document.getElementById('btn-toggle-summary');
  if (summaryVisible) {
    rail.classList.add('active');
    btn.classList.add('btn-primary');
    btn.classList.remove('btn-ghost');
    loadSummary();
    loadVersionList();
    // Show aggregate button only when there are subdirectories
    const hasDirs = onlyDirs().length > 0;
    document.getElementById('btn-generate-aggregate').style.display = hasDirs ? '' : 'none';
  } else {
    rail.classList.remove('active');
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-ghost');
  }
}

function toggleSummaryEdit() {
  const editBtn = document.getElementById('btn-summary-edit');
  if (summaryEditMode) {
    const editor = document.getElementById('summary-editor');
    if (editor) {
      summaryRawContent = editor.value;
      const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
      api(`/api/summary${dirParam}`, { method: 'POST', body: { content: summaryRawContent } });
    }
    summaryEditMode = false;
    editBtn.textContent = 'Edit';
    renderSummary();
  } else {
    summaryEditMode = true;
    editBtn.textContent = 'Done';
    renderSummary();
    const editor = document.getElementById('summary-editor');
    if (editor) editor.focus();
  }
}

function copySummary() {
  if (!summaryRawContent) return;
  navigator.clipboard.writeText(summaryRawContent).then(() => {
    const btn = document.getElementById('btn-summary-copy');
    btn.textContent = 'Copied';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

async function generateSummaryAction(aggregate = false) {
  if (!hasApiKey) {
    document.getElementById('btn-settings').click();
    return;
  }
  const btn = aggregate ? document.getElementById('btn-generate-aggregate') : document.getElementById('btn-generate-summary');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Generating...';

  // Also disable the other generate button
  const otherBtn = aggregate ? document.getElementById('btn-generate-summary') : document.getElementById('btn-generate-aggregate');
  if (otherBtn) otherBtn.disabled = true;

  // Show loading state in summary content area
  const el = document.getElementById('summary-content');
  const scope = aggregate ? 'all directories' : (currentDir || 'root');
  const steps = [
    'Reading annotations...',
    'Scanning text documents...',
    'Analyzing with Claude...',
    'Structuring summary...',
  ];
  let stepIdx = 0;
  el.innerHTML = `
    <div class="summary-loading">
      <div class="summary-loading-spinner"></div>
      <div class="summary-loading-text">
        Generating summary for <strong>${escapeHtml(scope)}</strong>
        <div class="summary-loading-step" id="loading-step">${steps[0]}</div>
      </div>
      <div class="summary-loading-shimmer">
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
        <div class="shimmer-line"></div>
      </div>
    </div>`;

  const stepInterval = setInterval(() => {
    stepIdx = Math.min(stepIdx + 1, steps.length - 1);
    const stepEl = document.getElementById('loading-step');
    if (stepEl) stepEl.textContent = steps[stepIdx];
  }, 3000);

  try {
    let url = '/api/summary/generate';
    const params = [];
    if (currentDir) params.push(`dir=${encodeURIComponent(currentDir)}`);
    if (aggregate) params.push('aggregate=true');
    if (params.length) url += '?' + params.join('&');
    const res = await api(url, { method: 'POST', body: {} });
    if (res.error) {
      alert('Error: ' + res.error);
      renderSummary(); // restore previous state
    } else if (res.content) {
      summaryRawContent = res.content;
      summaryCurrentVersion = res.version;
      summaryTotalVersions = res.totalVersions;
      summaryLastModified = new Date().toISOString();
      renderSummary();
      updateVersionNav();
    }
  } catch (e) {
    alert('Failed to generate summary: ' + e.message);
    renderSummary();
  } finally {
    clearInterval(stepInterval);
    btn.disabled = false;
    btn.textContent = aggregate ? 'Generate All' : 'Generate';
    if (otherBtn) otherBtn.disabled = false;
  }
}

function updateVersionNav() {
  const nav = document.getElementById('version-nav');
  const label = document.getElementById('version-label');
  const prevBtn = document.getElementById('btn-version-prev');
  const nextBtn = document.getElementById('btn-version-next');
  if (summaryTotalVersions > 0) {
    nav.style.display = '';
    label.textContent = `v${summaryCurrentVersion} of ${summaryTotalVersions}`;
    prevBtn.disabled = summaryCurrentVersion <= 1;
    nextBtn.disabled = summaryCurrentVersion >= summaryTotalVersions;
  } else {
    nav.style.display = 'none';
  }
}

async function loadVersion(version) {
  try {
    const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
    const res = await api(`/api/summary/versions/${version}${dirParam}`);
    if (res.error) return;
    summaryRawContent = res.content;
    summaryCurrentVersion = res.version;
    summaryTotalVersions = res.totalVersions;
    renderSummary();
    updateVersionNav();
  } catch (e) { /* ignore */ }
}

async function loadVersionList() {
  try {
    const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : '';
    const res = await api(`/api/summary/versions${dirParam}`);
    summaryTotalVersions = res.total;
    if (res.total > 0) {
      summaryCurrentVersion = res.versions[res.versions.length - 1];
      updateVersionNav();
    }
  } catch (e) { /* ignore */ }
}

document.getElementById('btn-toggle-summary').addEventListener('click', toggleSummary);

});

  if (summaryCurrentVersion < summaryTotalVersions) loadVersion(summaryCurrentVersion + 1);
});

// Summary reference click delegation
document.getElementById('summary-content').addEventListener('click', (e) => {
  const refEl = e.target.closest('[data-ref-type]');
  if (!refEl) return;
  e.preventDefault();

  const refType = refEl.dataset.refType;
  const filename = refEl.dataset.file;

  if (refType === 'comment') {
    const commentIndex = parseInt(refEl.dataset.commentIndex, 10);
    navigateToComment(filename, commentIndex);
  } else if (refType === 'image') {
    navigateToImage(filename);
  }
});

// ── Chat Panel ──
const CHAT_STORAGE_KEY = 'conan-chats';
let chatOpen = false;
let chatHistory = [];
let chatScope = 'directory';
let chatSending = false;
let chatSessions = []; // [{id, title, messages, ts}]
let activeChatId = null;

function loadChatSessions() {
  try {
    chatSessions = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY) || '[]');
  } catch { chatSessions = []; }
}

function saveChatSessions() {
  // Update active session
  if (activeChatId) {
    const s = chatSessions.find(c => c.id === activeChatId);
    if (s) {
      s.messages = chatHistory;
      s.ts = Date.now();
    }
  }
  localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatSessions));
}

function newChat() {
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const session = { id, title: 'New chat', messages: [], ts: Date.now() };
  chatSessions.unshift(session);
  activeChatId = id;
  chatHistory = session.messages;
  saveChatSessions();
  renderChatMessages();
  renderChatHistoryBar();
  document.getElementById('chat-input').focus();
}

function switchChat(id) {
  saveChatSessions(); // save current first
  const s = chatSessions.find(c => c.id === id);
  if (!s) return;
  activeChatId = id;
  chatHistory = s.messages;
  renderChatMessages();
  renderChatHistoryBar();
}

function deleteChat(id) {
  chatSessions = chatSessions.filter(c => c.id !== id);
  if (activeChatId === id) {
    if (chatSessions.length > 0) {
      switchChat(chatSessions[0].id);
    } else {
      newChat();
    }
  }
  saveChatSessions();
  renderChatHistoryBar();
}

function renderChatHistoryBar() {
  const bar = document.getElementById('chat-history-bar');
  let html = '<button class="chat-new-btn" id="chat-new-btn" title="New chat">+ New</button>';
  chatSessions.forEach(s => {
    const active = s.id === activeChatId ? ' active' : '';
    const label = escapeHtml(s.title);
    html += `<button class="chat-history-btn${active}" data-chat-id="${s.id}" title="${label}">${label}</button>`;
  });
  if (activeChatId && chatHistory.length > 0) {
    html += `<button class="chat-delete-chat" data-delete-id="${activeChatId}" title="Delete this chat">&times;</button>`;
  }
  bar.innerHTML = html;

  // Re-bind new chat button
  document.getElementById('chat-new-btn').addEventListener('click', newChat);
  // Bind history buttons
  bar.querySelectorAll('.chat-history-btn').forEach(btn => {
    btn.addEventListener('click', () => switchChat(btn.dataset.chatId));
  });
  // Bind delete
  const delBtn = bar.querySelector('.chat-delete-chat');
  if (delBtn) delBtn.addEventListener('click', () => deleteChat(delBtn.dataset.deleteId));
}

function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('chat-panel');
  const chatBtn = document.getElementById('btn-chat');
  if (chatOpen) {
    panel.classList.add('open');
    document.body.classList.add('chat-open');
    chatBtn.style.background = 'var(--surface-2)';
    chatBtn.style.color = 'var(--accent)';
    // Force reflow then show
    requestAnimationFrame(() => {
      document.getElementById('chat-input').focus();
    });
    // Load sessions and ensure one exists
    loadChatSessions();
    if (chatSessions.length === 0) {
      newChat();
    } else {
      if (!activeChatId) activeChatId = chatSessions[0].id;
      const s = chatSessions.find(c => c.id === activeChatId);
      if (s) chatHistory = s.messages;
      renderChatMessages();
      renderChatHistoryBar();
    }
  } else {
    saveChatSessions();
    panel.classList.remove('open');
    document.body.classList.remove('chat-open');
    chatBtn.style.background = '';
    chatBtn.style.color = '';
  }
}

function processChatRefs(html) {
  html = html.replace(/\[\[comment:([^\]#]+)#(\d+)\]\]/g, (_, file, idx) => {
    const encoded = escapeHtml(file);
    return `<a class="chat-ref chat-ref-comment" data-ref-type="comment" data-ref-file="${encoded}" data-ref-idx="${idx}" title="Go to comment #${idx} on ${encoded}"><i class="ph ph-chat-text" style="font-size:10px"></i>${encoded} #${idx}</a>`;
  });
  html = html.replace(/\[\[file:([^\]]+)\]\]/g, (_, file) => {
    const encoded = escapeHtml(file);
    return `<a class="chat-ref chat-ref-file" data-ref-type="file" data-ref-file="${encoded}" title="Open ${encoded}"><i class="ph ph-image" style="font-size:10px"></i>${encoded}</a>`;
  });
  return html;
}

function renderChatMessages() {
  const container = document.getElementById('chat-messages');
  const empty = document.getElementById('chat-empty');
  if (chatHistory.length === 0) {
    if (empty) empty.style.display = '';
    else container.innerHTML = '<div class="chat-empty" id="chat-empty"><div class="chat-empty-icon"><i class="ph ph-sparkle" style="font-size:20px;color:var(--text-muted)"></i></div><div class="chat-empty-title">Ask about your files</div><div class="chat-empty-desc">Chat with Claude about your annotations, patterns, and design decisions.</div><div class="chat-suggestions" id="chat-suggestions"><button class="chat-suggestion">What patterns do you see across annotations?</button><button class="chat-suggestion">Which files still need annotation?</button><button class="chat-suggestion">Summarize the key decisions made so far</button><button class="chat-suggestion">What components have been identified?</button></div></div>';
    // Rebind suggestions
    container.querySelectorAll('.chat-suggestion').forEach(btn => {
      btn.addEventListener('click', () => { document.getElementById('chat-input').value = ''; sendChatMessage(btn.textContent); });
    });
    return;
  }
  if (empty) empty.style.display = 'none';

  const copyIcon = '<i class="ph ph-copy" style="font-size:12px"></i>';
  let html = '';
  chatHistory.forEach((msg, i) => {
    const isError = msg.role === 'assistant' && (msg.content.startsWith('Error:') || msg.content.startsWith('Failed to reach'));
    if (msg.role === 'user') {
      html += `<div class="chat-msg user" style="animation-delay:${i * 0.03}s">${escapeHtml(msg.content)}</div>`;
    } else if (isError) {
      html += `<div class="chat-msg assistant chat-msg-error" style="animation-delay:${i * 0.03}s">${escapeHtml(msg.content)}</div>`;
    } else {
      let rendered = (typeof marked !== 'undefined') ? marked.parse(msg.content) : escapeHtml(msg.content);
      rendered = processChatRefs(rendered);
      html += `<div class="chat-msg assistant" style="animation-delay:${i * 0.03}s"><div class="chat-msg-rendered">${rendered}</div><div class="chat-msg-actions"><button class="chat-copy-btn" data-copy-idx="${i}">${copyIcon} Copy</button></div></div>`;
    }
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function showChatTyping() {
  const container = document.getElementById('chat-messages');
  const empty = document.getElementById('chat-empty');
  if (empty) empty.style.display = 'none';
  const typing = document.createElement('div');
  typing.className = 'chat-typing';
  typing.id = 'chat-typing';
  typing.innerHTML = '<div class="chat-typing-dot"></div><div class="chat-typing-dot"></div><div class="chat-typing-dot"></div>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
}

function removeChatTyping() {
  const el = document.getElementById('chat-typing');
  if (el) el.remove();
}

async function sendChatMessage(text) {
  if (!text || chatSending) return;
  if (!hasApiKey) {
    document.getElementById('btn-settings').click();
    return;
  }

  chatSending = true;
  const sendBtn = document.getElementById('chat-send');
  sendBtn.disabled = true;

  // Capture attachments for this message and clear them
  const msgAttachments = [...chatAttachments];
  chatAttachments = [];
  renderChatAttachments();

  // Display user message with attachment indicators
  const attachLabels = msgAttachments.map(a => a.type === 'project' ? (a.region ? `${a.path} (crop)` : a.path) : a.name);
  const displayText = attachLabels.length > 0
    ? text + '\n\n' + attachLabels.map(l => `📎 ${l}`).join('\n')
    : text;
  chatHistory.push({ role: 'user', content: displayText });

  // Auto-title from first user message
  if (activeChatId) {
    const s = chatSessions.find(c => c.id === activeChatId);
    if (s && s.title === 'New chat') {
      s.title = text.length > 40 ? text.slice(0, 40) + '...' : text;
      renderChatHistoryBar();
    }
  }
  renderChatMessages();
  showChatTyping();

  // Build attachments payload for server
  const apiAttachments = msgAttachments.map(a => {
    if (a.type === 'project') {
      const att = { type: 'project', path: a.path };
      if (a.region) att.region = a.region;
      return att;
    }
    return { type: 'upload', data: a.data, mediaType: a.mediaType, name: a.name };
  });

  try {
    const res = await api('/api/chat', {
      method: 'POST',
      body: {
        message: text,
        history: chatHistory.slice(0, -1),
        scope: chatScope,
        dir: currentDir,
        attachments: apiAttachments,
      },
    });

    removeChatTyping();

    if (res.error) {
      chatHistory.push({ role: 'assistant', content: 'Error: ' + res.error });
    } else {
      chatHistory.push({ role: 'assistant', content: res.reply });
    }
    renderChatMessages();
    saveChatSessions();
  } catch (e) {
    removeChatTyping();
    chatHistory.push({ role: 'assistant', content: 'Failed to reach Claude: ' + e.message });
    renderChatMessages();
    saveChatSessions();
  } finally {
    chatSending = false;
    sendBtn.disabled = false;
  }
}

// ── Context Menu (right-click "Send to Chat") ──
function showContextMenu(x, y, items) {
  // Remove any existing context menu
  document.querySelectorAll('.ctx-menu').forEach(m => m.remove());

  const menu = document.createElement('div');
  menu.className = 'ctx-menu';
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';

  const icons = {
    sparkle: '<i class="ph ph-sparkle" style="font-size:14px"></i>',
    image: '<i class="ph ph-image" style="font-size:14px"></i>',
  };

  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'ctx-menu-item';
    btn.innerHTML = (icons[item.icon] || '') + '<span>' + item.label + '</span>';
    btn.addEventListener('click', () => { menu.remove(); item.action(); });
    menu.appendChild(btn);
  });

  document.body.appendChild(menu);

  // Adjust if off-screen
  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
  if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';

  // Close on click outside or Escape
  const close = (e) => {
    if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('mousedown', close); document.removeEventListener('keydown', escClose); }
  };
  const escClose = (e) => { if (e.key === 'Escape') { menu.remove(); document.removeEventListener('mousedown', close); document.removeEventListener('keydown', escClose); } };
  setTimeout(() => { document.addEventListener('mousedown', close); document.addEventListener('keydown', escClose); }, 0);
}

// Drop zone on chat panel
(function setupChatDropZone() {
  const panel = document.getElementById('chat-panel');
  if (!panel) return;
  let dragCounter = 0;

  panel.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    panel.classList.add('drop-hover');
  });
  panel.addEventListener('dragleave', (e) => {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; panel.classList.remove('drop-hover'); }
  });
  panel.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });
  panel.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    panel.classList.remove('drop-hover');

    // Check for internal conan file drag
    const conanData = e.dataTransfer.getData('application/x-conan-file');
    if (conanData) {
      try {
        const data = JSON.parse(conanData);
        if (data.path) {
          addProjectAttachment(data.path, data.region || null, data.label || data.path.split('/').pop());
        }
      } catch (err) { console.error('Drop parse error:', err); }
      return;
    }

    // Check for external file drops (images from desktop)
    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      Array.from(e.dataTransfer.files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          chatAttachments.push({ type: 'upload', data: base64, mediaType: file.type, name: file.name, thumbUrl: reader.result });
          renderChatAttachments();
        };
        reader.readAsDataURL(file);
      });
    }
  });
})();

function cropUrl(filePath, region) {
  return `/api/files/${encodeURIComponent(filePath)}/crop?x=${region.x}&y=${region.y}&w=${region.w}&h=${region.h}`;
}

function addProjectAttachment(filePath, region, label) {
  const key = region ? `${filePath}#${region.x},${region.y},${region.w},${region.h}` : filePath;
  if (chatAttachments.find(a => a._key === key)) return; // no duplicates
  const thumbUrl = region ? cropUrl(filePath, region) : `/api/files/${encodeURIComponent(filePath)}/thumb`;
  chatAttachments.push({
    type: 'project', path: filePath, region: region || null,
    thumbUrl, _key: key, _label: label || filePath.split('/').pop(),
  });
  renderChatAttachments();
}

function showProjectFilePicker() {
  const imageFiles = files.filter(f => f.type === 'file' && /\.(jpe?g|png|gif|webp)$/i.test(f.name));
  if (imageFiles.length === 0) { alert('No image files in current directory'); return; }

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center';
  const modal = document.createElement('div');
  modal.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;max-width:600px;width:92%;max-height:75vh;overflow-y:auto';

  let html = '<div style="font-weight:600;margin-bottom:12px;font-size:14px">Select images &amp; crops to attach</div>';
  html += '<div style="display:flex;flex-direction:column;gap:12px">';
  imageFiles.forEach(f => {
    const crops = (f.comments || []).filter(c => c.region);
    html += '<div style="display:flex;gap:8px;align-items:flex-start">';
    // Full image
    html += `<div class="pick-item" data-path="${escapeHtml(f.path)}" data-type="full" style="cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent;transition:border-color 0.15s;width:80px;min-width:80px;flex-shrink:0"><img src="/api/files/${encodeURIComponent(f.path)}/thumb" style="width:100%;aspect-ratio:1;object-fit:cover;display:block"><div style="font-size:9px;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-muted)">${escapeHtml(f.name)}</div></div>`;
    // Crops
    if (crops.length > 0) {
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;padding-top:2px">';
      crops.forEach((c, ci) => {
        const commentIdx = f.comments.indexOf(c);
        const r = c.region;
        const url = cropUrl(f.path, r);
        const label = c.text.length > 30 ? c.text.slice(0, 30) + '...' : c.text;
        html += `<div class="pick-item" data-path="${escapeHtml(f.path)}" data-type="crop" data-region='${JSON.stringify(r)}' data-cidx="${commentIdx}" style="cursor:pointer;border-radius:6px;overflow:hidden;border:2px solid transparent;transition:border-color 0.15s;width:60px;min-width:60px"><img src="${url}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block"><div style="font-size:8px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-muted)" title="${escapeHtml(c.text)}">#${commentIdx + 1} ${escapeHtml(label)}</div></div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  html += '<div style="margin-top:12px;text-align:right"><button class="btn btn-ghost" id="pick-cancel" style="margin-right:8px">Cancel</button><button class="btn btn-primary" id="pick-done">Attach Selected</button></div>';
  modal.innerHTML = html;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const selected = new Map(); // key -> {path, region, label}
  modal.querySelectorAll('.pick-item').forEach(el => {
    el.addEventListener('click', () => {
      const p = el.dataset.path;
      const isCrop = el.dataset.type === 'crop';
      const region = isCrop ? JSON.parse(el.dataset.region) : null;
      const key = isCrop ? `${p}#${region.x},${region.y},${region.w},${region.h}` : p;
      if (selected.has(key)) { selected.delete(key); el.style.borderColor = 'transparent'; }
      else { selected.set(key, { path: p, region }); el.style.borderColor = 'var(--accent)'; }
    });
  });
  modal.querySelector('#pick-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  modal.querySelector('#pick-done').addEventListener('click', () => {
    selected.forEach(({ path, region }) => addProjectAttachment(path, region));
    renderChatAttachments();
    overlay.remove();
  });
}

    e.preventDefault();

      navigateToImage(refFile);

  const btn = e.target.closest('.chat-copy-btn');

  const idx = parseInt(btn.dataset.copyIdx);

  if (!msg) return;

    btn.classList.add('copied');
    btn.innerHTML = btn.innerHTML.replace('Copy', 'Copied!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = btn.innerHTML.replace('Copied!', 'Copy');
    }, 1500);
  });
});

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  const dir = hash ? decodeURIComponent(hash) : '';
  if (dir !== currentDir) {
    currentDir = dir;
    loadFiles();
  }
});

// Keyboard: Backspace to go up a directory (when not in gallery or input)
document.addEventListener('keydown', (e) => {
  if (galleryMode) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Backspace' && currentDir) {
    e.preventDefault();
    const parts = currentDir.split('/');
    parts.pop();
    navigateToDir(parts.join('/'));
  }
});

// ── Init ──
initFromHash();
loadConfig();
loadFiles();
checkApiKey();
</script>
</body>
